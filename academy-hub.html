<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academy - Super Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --nflx-bg: #141414;
  --nflx-red: #E50914;
  --nflx-red-dark: #B9090B;
  --nflx-text: #FFFFFF;
  --nflx-text-secondary: #E5E5E5;
  --nflx-text-muted: #AAAAAA;
  --nflx-btn-secondary-bg: rgba(109,109,110,0.7);
  --nflx-handle-bg: rgba(20,20,20,0.5);
  --nflx-rating-bg: rgba(51,51,51,0.6);
  --nflx-header-height: 70px;
  --nflx-ease: cubic-bezier(0.5, 0, 0.1, 1);
  --stadium-img: url('hero.jpg');
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
html, body { width: 100%; min-height: 100vh; overflow-x: hidden; }
body {
  font-family: 'Heebo', 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
  background: var(--nflx-bg);
  color: var(--nflx-text);
  line-height: 1.2;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { border: none; background: none; cursor: pointer; font-family: inherit; color: inherit; }
img { display: block; max-width: 100%; }

/* NAVBAR */
.main-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nflx-header-height);
  display: flex; align-items: center;
  padding: 0 48px;
  z-index: 100;
  background: linear-gradient(rgba(0,0,0,0.7) 10%, rgba(0,0,0,0));
  transition: background-color 0.4s;
}
.main-header.scrolled { background: var(--nflx-bg); }

.logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-left: 32px;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
  transition: transform 0.2s, opacity 0.2s;
  text-decoration: none;
  line-height: 1;
}
.logo:hover { transform: scale(1.05); }
.logo .logo-super {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900;
  font-size: 11px;
  color: #fff;
  letter-spacing: 2px;
  line-height: 1;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.6);
}
.logo .logo-line {
  width: 44px;
  height: 1.5px;
  background: linear-gradient(to right, transparent 0%, #fff 50%, transparent 100%);
  margin: 4px 0;
  border-radius: 2px;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
}
.logo .logo-academy {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900;
  font-size: 18px;
  color: var(--nflx-red);
  letter-spacing: 1.5px;
  line-height: 1;
  text-shadow: 0 2px 8px rgba(229,9,20,0.5), 0 1px 3px rgba(0,0,0,0.8), 0 0 12px rgba(229,9,20,0.3);
}

.tabbed-primary-navigation {
  display: flex; list-style: none; gap: 18px; align-items: center;
}
.navigation-tab a {
  font-size: 14px; font-weight: 500;
  color: var(--nflx-text);
  transition: color 0.3s;
  display: block; padding: 4px 0;
}
.navigation-tab a:hover { color: var(--nflx-text-muted); }
.navigation-tab a.current { font-weight: 700; }

.secondary-navigation {
  margin-left: auto;
  display: flex; align-items: center; gap: 22px;
  list-style: none;
}
.nav-icon-btn {
  color: var(--nflx-text);
  padding: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s;
}
.nav-icon-btn:hover { opacity: 0.7; }
.nav-icon-btn svg { width: 24px; height: 24px; }

.profile-icon {
  width: 32px; height: 32px; border-radius: 4px;
  background: linear-gradient(135deg, var(--nflx-red) 0%, var(--nflx-red-dark) 100%);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff;
  cursor: pointer;
}

/* BILLBOARD HERO */
.billboard-row {
  position: relative; width: 100%;
  padding-top: 60%;
  max-height: 92vh; min-height: 620px;
  margin-bottom: 40px;
  background: #000;
  overflow: hidden;
}
@media (min-width: 950px) {
  .billboard-row { padding-top: 46%; }
}

.hero-image-wrapper { position: absolute; inset: 0; z-index: 0; }
.hero-image {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  background-image: var(--stadium-img);
  background-size: cover;
  background-position: center 30%;
  filter: contrast(1.08) saturate(1.12) brightness(1.02);
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
  transform: scale(1.02);
  will-change: transform;
}

.hero-vignette {
  position: absolute; inset: 0; z-index: 7;
  background: linear-gradient(
    rgba(20,20,20,0) 0px,
    rgba(20,20,20,0) 35%,
    rgba(20,20,20,0.2) 55%,
    rgba(20,20,20,0.6) 80%,
    rgb(20,20,20) 100%
  );
}
.trailer-vignette {
  position: absolute; inset: 0; z-index: 8;
  background: linear-gradient(-77deg, rgba(0,0,0,0.35), rgba(0,0,0,0) 70%);
  transition: opacity 0.5s;
}

.meta-layer {
  position: absolute;
  bottom: 22%;
  right: 60px;
  z-index: 10;
  max-width: 540px;
  min-width: 380px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 18px;
  text-align: right;
}
@media (max-width: 950px) {
  .meta-layer {
    bottom: 14%;
    right: 16px;
    left: 16px;
    max-width: none;
    min-width: 0;
    gap: 14px;
  }
}

.logo-and-text { display: flex; flex-direction: column; gap: 14px; align-items: flex-start; width: 100%; }

.billboard-title {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900;
  font-size: clamp(32px, 3.4vw, 52px);
  color: var(--nflx-text);
  line-height: 1;
  letter-spacing: 2px;
  margin-bottom: 0;
  text-transform: uppercase;
  text-align: right;
  position: relative;
  text-shadow:
    0 0 24px rgba(0,0,0,0.95),
    2px 2px 8px rgba(0,0,0,1),
    -1px -1px 3px rgba(0,0,0,0.7),
    0 4px 30px rgba(0,0,0,0.8),
    1px 1px 0 rgba(0,0,0,0.5);
}
/* white accent line between SUPER TEAM and ACADEMY */
.billboard-title::after {
  content: "";
  display: block;
  width: 100px;
  height: 3px;
  background: linear-gradient(to right, transparent 0%, #fff 50%, transparent 100%);
  margin: 10px auto;
  border-radius: 2px;
  box-shadow: 0 0 12px rgba(255,255,255,0.6), 0 2px 6px rgba(0,0,0,0.6);
}
.billboard-title .title-academy {
  color: var(--nflx-red);
  display: block;
  text-align: center;
  width: 100%;
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  letter-spacing: 2px;
  font-size: 0.65em;
  font-weight: 900;
  text-shadow:
    0 0 20px rgba(229,9,20,0.6),
    2px 2px 8px rgba(0,0,0,1),
    -1px -1px 3px rgba(0,0,0,0.8),
    0 4px 24px rgba(229,9,20,0.35),
    0 6px 20px rgba(0,0,0,0.85),
    1px 1px 0 rgba(0,0,0,0.6);
}

.maturity-rating {
  display: inline-flex; align-items: center;
  background: var(--nflx-rating-bg);
  font-size: 13.2px; color: #fff;
  padding: 6px 10px 6px 42px;
  position: relative;
  width: fit-content;
  border-right: 3px solid rgba(220,220,220,0.7);
  backdrop-filter: blur(8px);
}
.maturity-rating::before {
  content: "⭐";
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
}
.maturity-rating .maturity-number { font-size: 13.2px; font-weight: 500; }

.synopsis {
  font-size: clamp(14px, 1.2vw, 16px);
  line-height: 1.6;
  color: var(--nflx-text);
  font-weight: 400;
  text-align: right;
  max-width: 480px;
  text-shadow:
    0 0 12px rgba(0,0,0,0.95),
    1px 1px 4px rgba(0,0,0,1),
    0 2px 16px rgba(0,0,0,0.8);
}

.billboard-links {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  justify-content: flex-start;
  flex-wrap: wrap;
}

.nflx-btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 8px 24px 8px 20px;
  border-radius: 4px;
  font-size: 16px; font-weight: 500;
  line-height: 1.5;
  transition: background-color 0.2s, opacity 0.2s;
}
.nflx-btn svg { width: 24px; height: 24px; }
.color-primary { background: #fff; color: #000; }
.color-primary:hover { background: rgba(255,255,255,0.75); }
.color-secondary { background: var(--nflx-btn-secondary-bg); color: #fff; }
.color-secondary:hover { background: rgba(109,109,110,0.4); }

/* ROWS / CAROUSEL */
.lolomo {
  position: relative; z-index: 5;
  margin-top: -80px;
}
@media (max-width: 950px) { .lolomo { margin-top: -40px; } }

.lolomoRow {
  position: relative;
  margin: 36px 0;
  padding: 0 48px;
}
@media (max-width: 600px) {
  .lolomoRow { padding: 0 16px; margin: 28px 0; }
}

.row-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.rowTitle {
  font-size: clamp(14px, 1.4vw, 20px);
  font-weight: 700;
  color: var(--nflx-text-secondary);
  letter-spacing: -0.2px;
}

.pagination-indicator {
  display: flex; gap: 1px;
  margin-right: auto;
  padding-bottom: 4px;
}
.pagination-indicator .dot {
  width: 12px; height: 2px;
  background: rgba(79,79,79,1);
  transition: background 0.3s;
}
.pagination-indicator .dot.active { background: rgb(170,170,170); }

.row-container { position: relative; }

.rowContent {
  display: flex; gap: 4px;
  overflow-x: auto;
  scroll-behavior: smooth;
  scroll-snap-type: x mandatory;
  padding-bottom: 20px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.rowContent::-webkit-scrollbar { display: none; }

.handle {
  position: absolute;
  top: 0; bottom: 20px;
  width: 48px;
  background: var(--nflx-handle-bg);
  z-index: 20;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.3s;
  color: #fff;
}
.row-container:hover .handle { opacity: 1; }
.handlePrev { right: 0; border-radius: 4px 0 0 4px; }
.handleNext { left: 0; border-radius: 0 4px 4px 0; }
.handle:hover { background: rgba(20,20,20,0.8); }
.handle:hover svg { transform: scale(1.25); }
.handle svg { width: 28px; height: 28px; transition: transform 0.2s; }

/* TITLE CARD */
.slider-item {
  flex: 0 0 calc((100% - 20px) / 6);
  scroll-snap-align: start;
  position: relative;
  padding: 0 0 0 2.4px;
}
@media (max-width: 1400px) { .slider-item { flex: 0 0 calc((100% - 16px) / 5); } }
@media (max-width: 1100px) { .slider-item { flex: 0 0 calc((100% - 12px) / 4); } }
@media (max-width: 800px)  { .slider-item { flex: 0 0 calc((100% - 8px) / 3); } }
@media (max-width: 500px)  { .slider-item { flex: 0 0 calc((100% - 4px) / 2); } }

.title-card-container {
  position: relative;
  transition: transform 0.4s var(--nflx-ease), z-index 0s 0.4s;
  cursor: pointer;
}
.title-card-container:hover {
  transform: scale(1.12);
  z-index: 10;
  transition-delay: 0.2s, 0s;
}

.title-card {
  position: relative;
  aspect-ratio: 16 / 9;
  border-radius: 4px;
  overflow: hidden;
  background: #2a2a2a;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  transition: box-shadow 0.3s;
}
.title-card-container:hover .title-card {
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.9);
}

.boxart-container { border-radius: 4px; overflow: hidden; width: 100%; height: 100%; }
.boxart-image {
  width: 100%; height: 100%;
  background-size: cover; background-position: center;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}

.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 40%, transparent 70%);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 12px;
  opacity: 0;
  transition: opacity 0.3s;
}
.title-card-container:hover .card-overlay { opacity: 1; }

.card-title {
  font-size: 14px; font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}
.card-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: #E5E5E5;
}
.card-badge {
  background: var(--nflx-red); color: #fff;
  padding: 1px 5px; border-radius: 2px;
  font-weight: 700; font-size: 9px;
  text-transform: uppercase; letter-spacing: 0.5px;
}

.progress {
  position: absolute;
  bottom: 8px; left: 8px; right: 8px;
  height: 3px;
  background: rgba(255,255,255,0.3);
  border-radius: 2px; overflow: hidden;
  z-index: 3;
}
.progress-completed {
  height: 100%;
  background: var(--nflx-red);
  transition: width 0.3s;
}

.boxart-1 { background: linear-gradient(135deg, #1a3a5c 0%, #0f1f33 100%); }
.boxart-2 { background: linear-gradient(135deg, #5c1a3a 0%, #330f1f 100%); }
.boxart-3 { background: linear-gradient(135deg, #3a5c1a 0%, #1f330f 100%); }
.boxart-4 { background: linear-gradient(135deg, #5c3a1a 0%, #331f0f 100%); }
.boxart-5 { background: linear-gradient(135deg, #3a1a5c 0%, #1f0f33 100%); }
.boxart-6 { background: linear-gradient(135deg, #1a5c5c 0%, #0f3333 100%); }
.boxart-7 { background: linear-gradient(135deg, #5c5c1a 0%, #33330f 100%); }
.boxart-8 { background: linear-gradient(135deg, #5c1a1a 0%, #330f0f 100%); }
.boxart-9 { background: linear-gradient(135deg, #2a2a5c 0%, #151533 100%); }
.boxart-10 { background: linear-gradient(135deg, #5c2a5c 0%, #331533 100%); }

.boxart-image::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08), transparent 70%);
}
.boxart-label {
  position: relative; z-index: 2;
  font-size: clamp(14px, 1.6vw, 22px);
  font-weight: 900;
  color: rgba(255,255,255,0.85);
  text-align: center;
  padding: 12px;
  letter-spacing: -0.5px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.user-indicator {
  position: fixed; bottom: 20px; left: 20px;
  background: rgba(0,0,0,0.7);
  padding: 8px 16px; border-radius: 4px;
  color: var(--nflx-text-muted);
  font-size: 12px; z-index: 50;
  backdrop-filter: blur(10px);
}

@media (max-width: 950px) {
  .main-header { padding: 0 16px; }
  .tabbed-primary-navigation { display: none; }
  .logo { margin-left: 16px; } .logo .logo-super { font-size: 10px; } .logo .logo-academy { font-size: 16px; } .logo .logo-line { width: 38px; }
  .secondary-navigation { gap: 12px; }
  .nflx-btn { font-size: 14px; padding: 6px 18px 6px 14px; }
}
@media (max-width: 500px) {
  .secondary-navigation .nav-icon-btn:first-child { display: none; }
  .meta-layer { bottom: 20%; }
  .billboard-links { flex-wrap: wrap; }
}

body::-webkit-scrollbar { width: 8px; }
body::-webkit-scrollbar-track { background: var(--nflx-bg); }
body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
body::-webkit-scrollbar-thumb:hover { background: #555; }

/* ═══════════════════════════════════════════
   DRIVE LOADING + VIDEO MODAL
   ═══════════════════════════════════════════ */
.drive-loading {
  display: flex; flex-direction: column; align-items: center;
  padding: 80px 20px;
  color: var(--nflx-text-muted);
  font-size: 14px;
  gap: 20px;
}
.drive-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(229,9,20,0.2);
  border-top-color: var(--nflx-red);
  border-radius: 50%;
  animation: drive-spin 0.8s linear infinite;
}
@keyframes drive-spin {
  to { transform: rotate(360deg); }
}

.drive-error {
  display: flex; flex-direction: column; align-items: center;
  padding: 60px 20px; color: #ff5757;
  font-size: 14px; gap: 12px;
}

.video-modal {
  position: fixed; inset: 0;
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}
.video-modal.active { display: flex; }

.video-modal-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.video-modal-content {
  position: relative; z-index: 2;
  width: min(90vw, 1200px);
  max-height: 90vh;
  background: #000;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 25px 60px rgba(0,0,0,0.9);
  animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes scaleIn {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.video-modal-title {
  padding: 16px 24px;
  background: #141414;
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  border-bottom: 1px solid #222;
}

.video-close {
  position: absolute;
  top: 12px;
  left: 12px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 18px;
  border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
  z-index: 3;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.video-close:hover { background: var(--nflx-red); }

.video-frame-wrapper {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: #000;
}
#videoFrame {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: 0;
}






.nav-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  margin-left: auto;
  background: linear-gradient(135deg, #E50914, #B9090B);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  box-shadow: 0 2px 8px rgba(229,9,20,0.3);
  white-space: nowrap;
  font-family: inherit;
  order: 999;
}
.nav-back-btn:hover {
  transform: translateX(-2px);
  box-shadow: 0 4px 12px rgba(229,9,20,0.5);
  opacity: 0.95;
}
.nav-back-btn svg {
  width: 14px; height: 14px;
  transition: transform 0.2s;
}
.nav-back-btn:hover svg {
  transform: translateX(-3px);
}
@media (max-width: 600px) {
  .nav-back-btn { padding: 6px 10px; font-size: 11px; }
  .nav-back-btn .back-label { display: none; }
}




/* ═══════════════════════════════════════════
   ELEGANT TEXT READABILITY (soft shadows like Netflix)
   ═══════════════════════════════════════════ */
.choice-title, .choice-description,
.hero-title, .hero-subtitle, .hero-title-academy,
.form-title, .billboard-title, .synopsis, .rowTitle,
.welcome-title, .welcome-subtitle,
.success-title, .success-eyebrow,
.logo-super, .logo-academy,
.card-title, .card-meta, .boxart-label {
  text-shadow:
    0 1px 2px rgba(0,0,0,0.6),
    0 2px 8px rgba(0,0,0,0.85),
    0 0 20px rgba(0,0,0,0.35) !important;
}

/* Deeper shadow for large hero-style text */
.hero-title, .billboard-title, .welcome-title, .form-title, .success-title {
  text-shadow:
    0 2px 4px rgba(0,0,0,0.7),
    0 4px 16px rgba(0,0,0,0.9),
    0 0 24px rgba(0,0,0,0.5) !important;
}

/* Red accent text keeps its colored glow */
.hero-title-academy, .logo-academy {
  text-shadow:
    0 2px 8px rgba(229,9,20,0.4),
    0 2px 4px rgba(0,0,0,0.9),
    0 4px 16px rgba(0,0,0,0.8) !important;
}

/* Don't apply shadow to text on solid/white buttons */
.color-primary, .color-primary span,
.submit-btn, .btn-primary,
.choice-cta, .nflx-btn.color-primary {
  text-shadow: none !important;
}

/* Subtle lift only for small labels on dark backgrounds */

<script>
const header = document.getElementById('mainHeader');
window.addEventListener('scroll', () => {
  if (window.scrollY > 80) header.classList.add('scrolled');
  else header.classList.remove('scrolled');
});

document.querySelectorAll('.row-container').forEach(container => {
  const content = container.querySelector('.rowContent');
  const prevBtn = container.querySelector('.handlePrev');
  const nextBtn = container.querySelector('.handleNext');
  const scrollAmount = () => content.clientWidth * 0.9;
  if (prevBtn) prevBtn.addEventListener('click', () => content.scrollBy({ left: scrollAmount(), behavior: 'smooth' }));
  if (nextBtn) nextBtn.addEventListener('click', () => content.scrollBy({ left: -scrollAmount(), behavior: 'smooth' }));
});

function scrollToRows() {
  document.getElementById('rowsContainer').scrollIntoView({ behavior: 'smooth' });
}

const params = new URLSearchParams(window.location.search);
const userEmail = params.get('user') || localStorage.getItem('userEmail');
if (userEmail) {
  const userName = userEmail.split('@')[0];
  const indicator = document.getElementById('userIndicator');
  document.getElementById('userNameDisplay').textContent = userName;
  indicator.style.display = 'block';
  document.getElementById('profileIcon').textContent = userName.charAt(0).toUpperCase();
  localStorage.setItem('userEmail', userEmail);
}

/* ═══════════════════════════════════════════
   GOOGLE DRIVE INTEGRATION
   ═══════════════════════════════════════════ */
const DRIVE_CONFIG = {
  API_KEY: 'AIzaSyB1hH50REJm_hu71AjYO8e4m3BdQC6GQ0g',
  ROOT_FOLDER_ID: '1UZ_MhVFkQvkLbFdUYpH3Mw_N92-bJoOd'
};

// Custom display order — folders matched by keyword (substring, case-insensitive)
// Folders not in this list appear AFTER, sorted alphabetically
const FOLDER_ORDER = [
  'מפיצים חדשים',          // זומים למפיצים חדשים
  'הזדמנות עסקית',          // הזדמנות עסקית - HOM
  'תזונה ומוצרים',          // זומים בנושא תזונה ומוצרים
  'שיטות עבודה',            // זומים בנושא שיטות עבודה (picks both "שיטות עבודה" variants)
  'ניהול וארגון',           // זומים בנושא ניהול וארגון
  'למפקחים',                // זומים למפקחים
  'WT ומעלה',               // זומים ל WT ומעלה
  'קבצים ארגוניים',
  'TELEGRAM ARCHIVE'
];

// Natural sort comparator for video titles (handles "1.", "10.", "Copy of" etc.)
function naturalCompare(a, b) {
  // Strip "Copy of" prefix and file extension
  const clean = s => s
    .replace(/^Copy of\s*/i, '')
    .replace(/\.(mp4|mov|avi|mkv|pdf|xlsx|docx)$/i, '')
    .trim();
  const ax = clean(a);
  const bx = clean(b);
  return ax.localeCompare(bx, 'he', { numeric: true, sensitivity: 'base' });
}

// Sort folders by custom order
function sortFolders(folders) {
  const getOrderIndex = folder => {
    const name = folder.name || '';
    for (let i = 0; i < FOLDER_ORDER.length; i++) {
      if (name.includes(FOLDER_ORDER[i])) return i;
    }
    return 999; // unknown folders go last
  };
  return folders.slice().sort((a, b) => {
    const ai = getOrderIndex(a);
    const bi = getOrderIndex(b);
    if (ai !== bi) return ai - bi;
    return naturalCompare(a.name, b.name);
  });
}

// Drive API: fetch folder contents
async function fetchDriveFolder(folderId) {
  const q = `'${folderId}' in parents and trashed=false`;
  const fields = 'files(id,name,mimeType,thumbnailLink,videoMediaMetadata,size,modifiedTime)';
  const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&key=${DRIVE_CONFIG.API_KEY}&fields=${encodeURIComponent(fields)}&pageSize=200`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.files || [];
  } catch (e) {
    console.error('Drive fetch error:', e);
    return [];
  }
}

// Clean folder name (remove English suffix)
function cleanFolderName(name) {
  return name
    .replace(/\s*-\s*Zoom sessions.*$/i, '')
    .replace(/\s*-\s*.*English.*$/i, '')
    .trim();
}

// Gradient palette for card backgrounds (cycled)
const boxartPalette = ['boxart-1','boxart-2','boxart-3','boxart-4','boxart-5','boxart-6','boxart-7','boxart-8','boxart-9','boxart-10'];

// Render a single row with files
function renderRow(folderName, files) {
  const videos = files
    .filter(f => f.mimeType && f.mimeType.startsWith('video/'))
    .sort((a, b) => naturalCompare(a.name, b.name));
  if (videos.length === 0) return '';

  const cleanTitle = cleanFolderName(folderName);
  const cards = videos.map((f, i) => {
    const boxartClass = boxartPalette[i % boxartPalette.length];
    const title = f.name.replace(/\.(mp4|mov|avi|mkv)$/i, '').replace(/^Copy of\s*/i, '').trim();
    const thumbnail = f.thumbnailLink
      ? f.thumbnailLink.replace(/=s\d+$/, '=s1280')
      : '';
    const thumbStyle = thumbnail
      ? `background-image: url('${thumbnail}'); background-size: cover; background-position: center;`
      : '';

    return `
      <div class="slider-item">
        <div class="title-card-container" data-video-id="${f.id}" data-video-title="${encodeURIComponent(title)}">
          <div class="title-card">
            <div class="boxart-container">
              <div class="boxart-image ${thumbnail ? '' : boxartClass}" style="${thumbStyle}">
                ${thumbnail ? '' : `<span class="boxart-label">${escapeHtml(title)}</span>`}
              </div>
            </div>
            <div class="card-overlay">
              <div class="card-title">${escapeHtml(title)}</div>
              <div class="card-meta">
                <span class="card-badge">HD</span>
                <span>▶️ Drive</span>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="lolomoRow">
      <div class="row-header">
        <h2 class="rowTitle">${escapeHtml(cleanTitle)}</h2>
        <div class="pagination-indicator">
          <span class="dot active"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>
      <div class="row-container">
        <button class="handle handlePrev" aria-label="הקודם"><svg viewBox="0 0 24 24" fill="none"><path fill="currentColor" d="M15.54 21.71a1 1 0 0 1-1.42 0L5.59 13.18a1.67 1.67 0 0 1 0-2.36l8.53-8.53a1 1 0 1 1 1.42 1.42L7.41 12l8.13 8.29a1 1 0 0 1 0 1.42"/></svg></button>
        <div class="rowContent">${cards}</div>
        <button class="handle handleNext" aria-label="הבא"><svg viewBox="0 0 24 24" fill="none"><path fill="currentColor" d="M8.46 2.29a1 1 0 0 1 1.42 0l8.53 8.53a1.67 1.67 0 0 1 0 2.36l-8.53 8.53a1 1 0 1 1-1.42-1.42L16.59 12 8.46 3.71a1 1 0 0 1 0-1.42"/></svg></button>
      </div>
    </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Main loader
async function loadAcademy() {
  const container = document.getElementById('rowsContainer');
  const loading = document.getElementById('loadingState');

  try {
    // 1. Fetch root folder contents
    const rootItems = await fetchDriveFolder(DRIVE_CONFIG.ROOT_FOLDER_ID);
    const rawFolders = rootItems.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
    const folders = sortFolders(rawFolders);

    if (folders.length === 0) {
      loading.innerHTML = '<p>לא נמצאו תיקיות. ודא שה-Folder ID נכון ושהתיקייה משותפת לצפייה.</p>';
      return;
    }

    // 2. Fetch each folder's contents in parallel
    const folderResults = await Promise.all(
      folders.map(async f => ({ folder: f, files: await fetchDriveFolder(f.id) }))
    );

    // 3. Render rows
    const rowsHtml = folderResults
      .map(({ folder, files }) => renderRow(folder.name, files))
      .filter(html => html.length > 0)
      .join('');

    container.innerHTML = rowsHtml || '<p style="padding:60px;text-align:center;color:#aaa;">אין סרטונים בתיקיות.</p>';

    // 4. Attach handlers to new cards + carousel arrows
    attachHandlers();

  } catch (err) {
    loading.innerHTML = `<div class="drive-error">❌ שגיאה בטעינה מהדרייב:<br><small>${escapeHtml(err.message)}</small></div>`;
  }
}

function attachHandlers() {
  // Carousel scroll arrows
  document.querySelectorAll('.row-container').forEach(container => {
    const content = container.querySelector('.rowContent');
    const prevBtn = container.querySelector('.handlePrev');
    const nextBtn = container.querySelector('.handleNext');
    const scrollAmount = () => content.clientWidth * 0.9;
    if (prevBtn) prevBtn.addEventListener('click', () => content.scrollBy({ left: scrollAmount(), behavior: 'smooth' }));
    if (nextBtn) nextBtn.addEventListener('click', () => content.scrollBy({ left: -scrollAmount(), behavior: 'smooth' }));
  });

  // Card click → open video modal
  document.querySelectorAll('.title-card-container[data-video-id]').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.videoId;
      const title = decodeURIComponent(card.dataset.videoTitle || '');
      openVideo(id, title);
    });
  });
}

function openVideo(fileId, title) {
  const modal = document.getElementById('videoModal');
  const frame = document.getElementById('videoFrame');
  const titleEl = document.getElementById('videoModalTitle');
  frame.src = `https://drive.google.com/file/d/${fileId}/preview`;
  titleEl.textContent = title;
  modal.classList.add('active');
  modal.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closeVideo() {
  const modal = document.getElementById('videoModal');
  const frame = document.getElementById('videoFrame');
  modal.classList.remove('active');
  modal.setAttribute('aria-hidden', 'true');
  frame.src = '';
  document.body.style.overflow = '';
}

// Keyboard: Escape closes modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeVideo();
});

// Start loading on page ready
loadAcademy();
</script>
