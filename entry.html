<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Team Academy - כניסה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  padding: 20px;
}

.container {
  max-width: 600px;
  width: 100%;
  text-align: center;
}

.logo {
  font-size: 120px;
  font-weight: 900;
  margin-bottom: 30px;
  color: #ffffff;
  letter-spacing: -3px;
  text-shadow: 0 0 15px rgba(204,51,51,0.2);
}

.subtitle {
  font-size: 22px;
  color: #ffffff;
  margin-bottom: 80px;
  font-weight: 300;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.options {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.option-btn {
  padding: 40px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 12px;
  color: #fff;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Heebo', sans-serif;
  text-decoration: none;
  display: block;
  box-shadow: 0 8px 16px rgba(0,0,0,0.15);
}

.option-btn:hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.6);
  transform: translateY(-5px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.25);
}

.option-icon {
  font-size: 48px;
  margin-bottom: 15px;
  display: block;
}

.option-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #ffffff;
}

.option-desc {
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  line-height: 1.6;
}

.divider {
  margin: 30px 0;
  color: #444;
  font-size: 12px;
}

@media (max-width: 600px) {
  .logo {
    font-size: 80px;
  }

  .option-btn {
    padding: 30px 20px;
  }

  .option-title {
    font-size: 20px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">SUPER TEAM</div>
  <p class="subtitle">בחר כיצד תרצה להמשיך</p>

  <div class="options">
    <a href="register.html" class="option-btn">
      <span class="option-icon">➕</span>
      <div class="option-title">בקשה להצטרפות חדשה</div>
      <div class="option-desc">אם אתה משתמש חדש, מלא את הטופס וקבל אישור מהטאב שלך</div>
    </a>

    <div class="divider">או</div>

    <a href="access.html" class="option-btn">
      <span class="option-icon">👤</span>
      <div class="option-title">כניסה משתמש קיים</div>
      <div class="option-desc">אם כבר אושרת, הכנסי את הפרטים שלך כדי להיכנס לאקדמיה</div>
    </a>
  </div>
</div>

</body>
</html>
