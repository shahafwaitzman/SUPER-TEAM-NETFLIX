<style>
:root {
  --nflx-bg: #141414;
  --nflx-red: #E50914;
  --nflx-red-dark: #B9090B;
  --nflx-text: #FFFFFF;
  --nflx-text-muted: #AAAAAA;
  --nflx-header-height: 70px;
  --stadium-img: url('hero.jpg');
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; min-height: 100vh; overflow-x: hidden; }
body {
  font-family: 'Heebo', 'Helvetica Neue', sans-serif;
  background: var(--nflx-bg);
  color: var(--nflx-text);
  line-height: 1.2;
  -webkit-font-smoothing: antialiased;
  position: relative;
}
a { color: inherit; text-decoration: none; }
button { border: none; background: none; cursor: pointer; font-family: inherit; color: inherit; }

/* Stadium bg with vignette */
body::before {
  content: "";
  position: fixed; inset: 0; z-index: 0;
  background-image: var(--stadium-img);
  background-size: cover;
  background-position: center 30%;
  filter: contrast(1.08) saturate(1.12) brightness(0.75);
  transform: scale(1.02);
}
body::after {
  content: "";
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(180deg,
    rgba(20,20,20,0.4) 0%,
    rgba(20,20,20,0.7) 50%,
    rgba(20,20,20,0.95) 100%);
}

/* NAVBAR */
.main-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nflx-header-height);
  display: flex; align-items: center;
  padding: 0 48px;
  z-index: 100;
  background: linear-gradient(rgba(0,0,0,0.7) 10%, rgba(0,0,0,0));
}
.logo {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin-left: 32px;
  text-transform: uppercase;
  user-select: none; line-height: 1;
}
.logo-super {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 11px;
  color: #fff; letter-spacing: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
.logo-line {
  width: 44px; height: 1.5px;
  background: linear-gradient(to right, transparent 0%, #fff 50%, transparent 100%);
  margin: 4px 0; border-radius: 2px;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
}
.logo-academy {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 18px;
  color: var(--nflx-red); letter-spacing: 1.5px;
  text-shadow: 0 2px 8px rgba(229,9,20,0.5), 0 1px 3px rgba(0,0,0,0.8);
}

/* Container */
.entry-container {
  position: relative; z-index: 10;
  min-height: 100vh;
  padding: calc(var(--nflx-header-height) + 40px) 48px 60px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 48px;
}

.hero-section {
  text-align: center;
  max-width: 780px;
  animation: fadeInUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.eyebrow {
  font-size: 14px;
  color: var(--nflx-red);
  letter-spacing: 5px;
  font-weight: 700;
  margin-bottom: 16px;
  text-transform: uppercase;
  text-shadow: 0 0 12px rgba(229,9,20,0.4);
}
.hero-title {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-size: clamp(42px, 6vw, 80px);
  font-weight: 900;
  line-height: 1;
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-shadow: 0 0 24px rgba(0,0,0,0.95), 2px 2px 8px rgba(0,0,0,1);
}
.hero-title-academy {
  display: block;
  color: var(--nflx-red);
  font-size: 0.65em;
  margin-top: 6px;
  text-shadow: 0 0 20px rgba(229,9,20,0.6), 2px 2px 8px rgba(0,0,0,1);
}
.hero-divider {
  width: 100px; height: 3px;
  margin: 16px auto;
  background: linear-gradient(to right, transparent 0%, #fff 50%, transparent 100%);
  border-radius: 2px;
  box-shadow: 0 0 12px rgba(255,255,255,0.6);
}
.hero-subtitle {
  font-size: clamp(14px, 1.4vw, 18px);
  color: rgba(255,255,255,0.9);
  margin-top: 20px;
  line-height: 1.6;
  text-shadow: 0 1px 8px rgba(0,0,0,0.9);
}

/* Choice grid (matches dashboard) */
.choice-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 28px;
  max-width: 980px;
  width: 100%;
  animation: fadeInUp 1s 0.2s both cubic-bezier(0.34, 1.56, 0.64, 1);
}

.choice-card {
  position: relative;
  aspect-ratio: 16 / 10;
  max-height: 380px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  background: #1a1a1a;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
              box-shadow 0.4s, border-color 0.3s;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  text-decoration: none;
  color: inherit;
}
.choice-card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: var(--nflx-red);
}
.choice-card:hover.card-new {
  box-shadow: 0 24px 60px rgba(229,9,20,0.35), 0 12px 32px rgba(0,0,0,0.8);
}
.choice-card:hover.card-existing {
  box-shadow: 0 24px 60px rgba(30,90,180,0.35), 0 12px 32px rgba(0,0,0,0.8);
}

.choice-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center top;
  opacity: 1; transition: opacity 0.4s, transform 0.6s;
}
.choice-card:hover .choice-bg {
  opacity: 1;
  transform: scale(1.05);
}
.card-new .choice-bg {
  background-image: url('previews/preview-register.jpg');
  background-position: center top;
  filter: brightness(0.85) saturate(1.15);
}
.card-existing .choice-bg {
  background-image: url('previews/preview-access.jpg');
  background-position: center top;
  filter: brightness(0.85) saturate(1.15);
}

.choice-card::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(to top,
    rgba(0,0,0,0.92) 0%,
    rgba(0,0,0,0.4) 35%,
    rgba(0,0,0,0) 65%);
  z-index: 2;
}

.choice-icon {
  position: absolute;
  top: 38%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 110px;
  z-index: 2;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.8));
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.choice-card:hover .choice-icon {
  transform: translate(-50%, -50%) scale(1.1);
}

.choice-content {
  position: relative; z-index: 3;
  padding: 28px 26px;
  display: flex; flex-direction: column; gap: 10px;
}

.choice-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  background: rgba(229,9,20,0.9);
  color: #fff;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  width: fit-content;
}
.card-existing .choice-badge {
  background: rgba(30,120,200,0.9);
}

.choice-title {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-size: 28px; font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.choice-description {
  font-size: 14px;
  color: rgba(255,255,255,0.85);
  line-height: 1.5;
  margin-bottom: 4px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
.choice-cta {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px;
  background: #fff; color: #000;
  border-radius: 4px;
  font-size: 14px; font-weight: 700;
  width: fit-content;
  transition: background 0.2s, color 0.2s;
  margin-top: 4px;
}
.choice-card:hover.card-new .choice-cta {
  background: var(--nflx-red); color: #fff;
}
.choice-card:hover.card-existing .choice-cta {
  background: #2a5ab8; color: #fff;
}
.choice-cta svg { width: 14px; height: 14px; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .main-header { padding: 0 16px; }
  .entry-container { padding: calc(var(--nflx-header-height) + 20px) 16px 40px; gap: 32px; }
  .choice-grid { grid-template-columns: 1fr; gap: 18px; }
  .choice-card { aspect-ratio: 16/10; max-height: 280px; }
  .choice-icon { font-size: 76px; top: 38%; }
  .choice-title { font-size: 22px; }
}




/* ═══════════════════════════════════════════
   ELEGANT TEXT READABILITY (soft shadows like Netflix)
   ═══════════════════════════════════════════ */
.choice-title, .choice-description,
.hero-title, .hero-subtitle, .hero-title-academy,
.form-title, .billboard-title, .synopsis, .rowTitle,
.welcome-title, .welcome-subtitle,
.success-title, .success-eyebrow,
.logo-super, .logo-academy,
.card-title, .card-meta, .boxart-label {
  text-shadow:
    0 1px 2px rgba(0,0,0,0.6),
    0 2px 8px rgba(0,0,0,0.85),
    0 0 20px rgba(0,0,0,0.35) !important;
}

/* Deeper shadow for large hero-style text */
.hero-title, .billboard-title, .welcome-title, .form-title, .success-title {
  text-shadow:
    0 2px 4px rgba(0,0,0,0.7),
    0 4px 16px rgba(0,0,0,0.9),
    0 0 24px rgba(0,0,0,0.5) !important;
}

/* Red accent text keeps its colored glow */
.hero-title-academy, .logo-academy {
  text-shadow:
    0 2px 8px rgba(229,9,20,0.4),
    0 2px 4px rgba(0,0,0,0.9),
    0 4px 16px rgba(0,0,0,0.8) !important;
}

/* Don't apply shadow to text on solid/white buttons */
.color-primary, .color-primary span,
.submit-btn, .btn-primary,
.choice-cta, .nflx-btn.color-primary {
  text-shadow: none !important;
}

/* Subtle lift only for small labels on dark backgrounds */
.welcome-eyebrow, .form-eyebrow, .choice-badge,
.card-badge, .nav-back-btn span {
  text-shadow: 0 1px 2px rgba(0,0,0,0.6) !important;
}

/* ═══════════════════════════════════════════
   MOBILE TAP TARGETS (44x44 minimum for accessibility)
   ═══════════════════════════════════════════ */
@media (max-width: 600px) {
  .nav-back-btn {
    min-width: 44px;
    min-height: 44px;
    padding: 10px 12px !important;
    justify-content: center;
  }
  .logout-btn {
    min-height: 44px;
    padding: 10px 16px !important;
  }
  .back-link a, a[href="entry.html"].back-link {
    display: inline-block;
    min-height: 44px;
    padding: 12px 16px !important;
    line-height: 20px;
  }
  .back-link {
    padding: 4px 0;
  }
  .nav-icon-btn {
    min-width: 44px;
    min-height: 44px;
  }
  .logo {
    min-height: 44px;
    padding: 6px 8px;
  }
  .user-avatar, .profile-icon {
    min-width: 44px;
    min-height: 44px;
  }
  /* Form submit buttons full-width min 48px */
  .submit-btn, .btn-primary, .btn-secondary, .nflx-btn {
    min-height: 48px;
  }
}





/* ═════ Shared hero background (crowd + Israeli flag) ═════ */
body.stn-bg-hero {
  position: relative;
  background-color: #0a0a0a;
}
body.stn-bg-hero::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url('hero.jpg');
  background-size: cover;
  background-position: center 30%;
  opacity: 0.35;
  z-index: -2;
  pointer-events: none;
  filter: contrast(1.05) saturate(1.1) brightness(0.9);
}
body.stn-bg-hero::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 30%, rgba(229,9,20,0.12), transparent 70%),
    linear-gradient(180deg, rgba(10,10,10,0.55) 0%, rgba(10,10,10,0.75) 45%, rgba(10,10,10,0.92) 100%);
  z-index: -1;
  pointer-events: none;
}

/* ═════ Super Team Nav — final (retention-spec) ═════ */
body.stn-installed { padding-top: 68px; margin: 0; }

.stn-bar {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000; height: 68px;
  display: flex; align-items: center;
  gap: 16px; padding: 0 24px;
  background: rgba(10,10,10,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-family: 'Heebo', 'Segoe UI', Arial, sans-serif;
  direction: rtl;
}
.stn-bar.scrolled { background: rgba(10,10,10,0.97); }

.stn-logo {
  flex-shrink: 0;
  display: inline-flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-decoration: none; user-select: none;
  line-height: 1; padding: 4px 0;
}
.stn-logo .stn-logo-super {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 11px;
  color: #fff; letter-spacing: 2.2px;
}
.stn-logo .stn-logo-line {
  width: 44px; height: 1.5px;
  background: linear-gradient(to right, transparent, #fff, transparent);
  margin: 3px 0; border-radius: 2px;
}
.stn-logo .stn-logo-brand {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 19px;
  color: #E50914; letter-spacing: 1.6px;
  text-shadow: 0 2px 8px rgba(229,9,20,0.45);
}

/* Right cluster: logo + hamburger */
.stn-right {
  flex-shrink: 0;
  display: inline-flex; align-items: center;
  gap: 8px;
  order: 0;
}

/* Hamburger */
.stn-ham-wrap { position: relative; }
.stn-ham-btn {
  width: 38px; height: 38px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: transparent; border: none;
  color: rgba(255,255,255,0.75);
  cursor: pointer; padding: 0;
  transition: all 0.15s;
}
.stn-ham-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.stn-ham-btn svg { width: 18px; height: 18px; fill: currentColor; }
.stn-ham-menu {
  position: absolute;
  top: calc(100% + 10px);
  inset-inline-end: 0;
  min-width: 240px;
  background: rgba(18,18,18,0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.6);
  padding: 8px 0;
  display: none; flex-direction: column;
  z-index: 1100;
}
.stn-ham-menu.open { display: flex; }
.stn-ham-header {
  font-size: 10px; font-weight: 800;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase; letter-spacing: 1.4px;
  padding: 10px 18px 6px;
}
.stn-ham-link {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px;
  color: #fff;
  font-size: 13px; font-weight: 600;
  text-decoration: none;
  transition: background 0.15s;
  border: none; background: transparent;
  font-family: inherit; text-align: right;
  cursor: pointer; width: 100%;
}
.stn-ham-link:hover { background: rgba(255,255,255,0.08); }
.stn-ham-link.active {
  background: rgba(229,9,20,0.2);
  border-inline-end: 3px solid #E50914;
}
.stn-ham-link-brand {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-size: 13px; letter-spacing: 1.5px;
  color: #E50914;
  margin-inline-start: auto;
}
.stn-ham-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 6px 0; }

/* Middle: tabs */
.stn-tabs {
  flex: 1;
  display: inline-flex; align-items: center;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  justify-content: center;
  order: 1;
}
.stn-tabs::-webkit-scrollbar { display: none; }

.stn-tab {
  display: inline-flex; align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 7px;
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.75);
  font-family: inherit;
  font-size: 14px; font-weight: 500;
  cursor: pointer; text-decoration: none;
  transition: color 0.15s, background 0.15s;
  white-space: nowrap;
}
.stn-tab:hover { color: #fff; background: rgba(255,255,255,0.08); }
.stn-tab.active,
.stn-tab[aria-current="page"] {
  background: #E50914;
  color: #fff;
  font-weight: 600;
}
.stn-tab svg { width: 14px; height: 14px; fill: currentColor; }

/* Left cluster: back + home */
.stn-left {
  flex-shrink: 0;
  display: inline-flex; align-items: center;
  gap: 2px;
  order: 2;
}

@media (max-width: 900px) {
  .stn-bar { gap: 8px; padding: 0 14px; height: 60px; }
  body.stn-installed { padding-top: 60px; }
  .stn-tab-label { display: none; }
  .stn-tab { padding: 7px 10px; font-size: 13px; }
  .stn-logo .stn-logo-brand { font-size: 16px; }
  .stn-logo .stn-logo-super { font-size: 10px; }
}
/* ═════ /final ═════ */

<script>
(function() {
  function init() {
    if (document.body) document.body.classList.add('stn-installed');
    window.addEventListener('scroll', function() { var b = document.getElementById('stnBar'); if (b) b.classList.toggle('scrolled', window.scrollY > 20); });
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('#stnHamBtn'); var menu = document.getElementById('stnHamMenu');
      if (btn && menu) { e.stopPropagation(); menu.classList.toggle('open'); return; }
      if (menu && menu.classList.contains('open') && !e.target.closest('.stn-ham-wrap')) menu.classList.remove('open');
    });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { var m = document.getElementById('stnHamMenu'); if (m) m.classList.remove('open'); } });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
