<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אישור משתמש</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#141414;color:#e5e5e5;font-family:'Heebo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#1a1a1a;border-radius:10px;padding:48px 40px;text-align:center;max-width:420px;width:100%}
.icon{font-size:64px;margin-bottom:20px}
h1{font-size:24px;color:#fff;margin-bottom:12px}
p{font-size:15px;color:#999;line-height:1.6;margin-bottom:12px}
.btn{display:inline-block;margin-top:24px;padding:12px 28px;background:#e50914;color:#fff;border-radius:4px;font-size:15px;font-weight:700;text-decoration:none;cursor:pointer;border:none;font-family:inherit}
.btn:hover{background:#b20710}
.debug{font-size:12px;color:#666;margin-top:24px;padding:12px;background:#0a0a0a;border-radius:4px;max-height:150px;overflow-y:auto}
</style>
</head>
<body>
<div class="box" id="box">
<div class="icon">⏳</div>
<h1>מעבד...</h1>
<p>נא המתן</p>
<div class="debug" id="debug"></div>
</div>
<script>
const FB='https://super-team-netflix-default-rtdb.europe-west1.firebasedatabase.app';
function log(m){console.log('[approve]'+m);document.getElementById('debug').innerHTML+=m+'<br>';document.getElementById('debug').scrollTop=document.getElementById('debug').scrollHeight;}
async function approve(){try{log('התחלה...');const params=new URLSearchParams(window.location.search);const key=params.get('key');const box=document.getElementById('box');if(!key){log('❌ אין KEY בURL');box.innerHTML='<div class="icon">❌</div><h1>לינק לא תקין</h1>';return;}log('KEY:'+key);log('בדיקת משתמש בFirebase...');const userRes=await fetch(FB+'/users/'+key+'.json');log('Firebase response:'+userRes.status);const user=await userRes.json();log('משתמש:'+(user?user.name:'לא נמצא'));if(!user){log('❌ משתמש לא נמצא');box.innerHTML='<div class="icon">❌</div><h1>משתמש לא נמצא</h1>';return;}if(user.status==='approved'){log('ℹ️ משתמש כבר מאושר');box.innerHTML='<div class="icon">✅</div><h1 style="color:#46d369">'+user.name+' כבר מאושר!</h1>';return;}log('שליחת PATCH לFirebase...');const patchRes=await fetch(FB+'/users/'+key+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'approved'})});log('PATCH response:'+patchRes.status);if(!patchRes.ok)throw new Error('Failed to update:'+patchRes.status);const patchData=await patchRes.json();log('✅ STATUS עודכן לapproved');const backUrl=window.location.origin.includes('github.io')?window.location.origin+'/SUPER-TEAM-NETFLIX/':window.location.origin+'/';log('Return URL:'+backUrl);box.innerHTML='<div class="icon">✅</div><h1 style="color:#46d369">'+user.name+' אושר!</h1><p>'+user.name+' יכול כעת להיכנס לאקדמיה.</p><a href="'+backUrl+'" class="btn">חזרה לאקדמיה</a>';}catch(e){log('❌ שגיאה:'+e.message);box.innerHTML='<div class="icon">❌</div><h1 style="color:#e50914">שגיאה</h1><p>'+e.message+'</p>';}}
approve();
</script>
</body>
</html>
