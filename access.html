<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כניסה - Super Team Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
  color: #e5e5e5;
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 500px;
  width: 100%;
  background: rgba(26,26,46,0.6);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  padding: 50px 40px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.15);
}
h1 {
  font-size: 28px;
  margin-bottom: 10px;
  color: #ffffff;
  font-weight: 900;
  letter-spacing: -1px;
}
.subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 40px;
}
.form-group {
  margin-bottom: 20px;
}
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  color: #ffffff;
  font-size: 14px;
}
input, select {
  width: 100%;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  background: rgba(0,0,0,0.2);
  color: #ffffff;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.3s ease;
}
input:focus, select:focus {
  border-color: rgba(255,255,255,0.4);
  background: rgba(0,0,0,0.3);
  outline: none;
  box-shadow: 0 0 10px rgba(204,51,51,0.2);
}
button {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  color: #ffffff;
  cursor: pointer;
  font-weight: 700;
  margin-top: 20px;
  font-family: inherit;
  font-size: 15px;
  transition: all 0.3s ease;
}
button:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.5);
  box-shadow: 0 8px 16px rgba(0,0,0,0.25);
  transform: translateY(-2px);
}
.message {
  margin-top: 16px;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  font-size: 14px;
  display: none;
}
.error {
  background: rgba(255,107,107,0.15);
  color: #ff6b6b;
}
.loading {
  background: rgba(245,197,24,0.15);
  color: #f5c518;
}
.back {
  text-align: center;
  margin-top: 24px;
}
.back a {
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 14px;
  transition: all 0.3s ease;
}
.back a:hover {
  color: #ffffff;
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="container">
  <h1>🔑 כניסה לאקדמיה</h1>
  <p class="subtitle">הזן את פרטיך כדי להכנס</p>
  
  <div class="form-group">
    <label>שם מלא</label>
    <input type="text" id="name" placeholder="שם מלא">
  </div>
  
  <div class="form-group">
    <label>אימייל</label>
    <input type="email" id="email" placeholder="example@gmail.com">
  </div>
  
  <div class="form-group">
    <label>בחר TAB</label>
    <select id="tab">
      <option value="">-- בחר TAB --</option>
      <option value="shahafwai@gmail.com">שחף ויצמן</option>
      <option value="other@example.com">אחר</option>
    </select>
  </div>
  
  <button onclick="verify()">כניסה</button>
  
  <div class="message" id="message" style="display:none;"></div>
  
  <div class="back">
    <a href="entry.html">← חזור</a>
  </div>
</div>

<script>
const FIREBASE_URL = 'https://super-team-netflix-default-rtdb.europe-west1.firebasedatabase.app';

async function verify() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const tab = document.getElementById('tab').value;
  const msgDiv = document.getElementById('message');
  
  if (!name || !email || !tab) {
    showMessage('❌ יש למלא את כל השדות', 'error');
    return;
  }
  
  showMessage('⏳ בדיקה...', 'loading');
  
  try {
    const res = await fetch(FIREBASE_URL + '/users.json');
    const users = await res.json() || {};
    
    for (const [key, user] of Object.entries(users)) {
      if (user.name === name && 
          user.email === email && 
          user.tab === tab && 
          user.status === 'approved') {
        msgDiv.style.display = 'none';
        const homeUrl = window.location.origin.includes('github.io')
          ? window.location.origin + '/SUPER-TEAM-NETFLIX/'
          : window.location.origin + '/';
        window.location.href = 'dashboard.html?user=' + encodeURIComponent(email);
        return;
      }
    }
    
    showMessage('❌ הפרטים לא תואמים. בדוק את השדות או צור קשר לטאב שלך', 'error');
    
  } catch(e) {
    showMessage('❌ שגיאה: ' + e.message, 'error');
  }
}

function showMessage(text, type) {
  const msgDiv = document.getElementById('message');
  msgDiv.textContent = text;
  msgDiv.className = 'message ' + type;
  msgDiv.style.display = 'block';
}

document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') verify();
});
</script>
</body>
</html>
