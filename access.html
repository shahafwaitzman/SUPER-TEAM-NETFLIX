<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כניסה - Super Team Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #141414; color: #e5e5e5;
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.container {
  max-width: 500px; width: 100%;
  background: #1a1a1a; border-radius: 10px;
  padding: 40px;
}
h1 { font-size: 28px; margin-bottom: 10px; }
.subtitle { font-size: 14px; color: #999; margin-bottom: 30px; }
.form-group { margin-bottom: 15px; }
label { display: block; margin-bottom: 5px; font-weight: 600; }
input, select {
  width: 100%; padding: 10px; border: 1px solid #333;
  border-radius: 4px; background: #0a0a0a; color: #e5e5e5;
  font-size: 14px; font-family: inherit;
}
input:focus, select:focus { border-color: #e50914; outline: none; }
button {
  width: 100%; padding: 12px; background: #e50914; color: #fff;
  border: none; border-radius: 4px; cursor: pointer; font-weight: 700;
  margin-top: 20px; font-family: inherit; font-size: 16px;
}
button:hover { background: #b20710; }
.message {
  margin-top: 16px; padding: 12px; border-radius: 4px;
  text-align: center; font-size: 14px;
}
.error { background: rgba(229,9,20,0.15); color: #ff6b6b; }
.loading { background: rgba(245,197,24,0.15); color: #f5c518; }
.back { text-align: center; margin-top: 20px; }
.back a {
  color: #e50914; text-decoration: none; font-size: 14px;
}
.back a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>🔑 כניסה לאקדמיה</h1>
  <p class="subtitle">הזן את פרטיך כדי להכנס</p>
  
  <div class="form-group">
    <label>שם מלא</label>
    <input type="text" id="name" placeholder="שם מלא">
  </div>
  
  <div class="form-group">
    <label>אימייל</label>
    <input type="email" id="email" placeholder="example@gmail.com">
  </div>
  
  <div class="form-group">
    <label>בחר TAB</label>
    <select id="tab">
      <option value="">-- בחר TAB --</option>
      <option value="shahafwai@gmail.com">שחף ויצמן</option>
      <option value="other@example.com">אחר</option>
    </select>
  </div>
  
  <button onclick="verify()">כניסה</button>
  
  <div class="message" id="message" style="display:none;"></div>
  
  <div class="back">
    <a href="home.html">← חזור לעמוד הבית</a>
  </div>
</div>

<script>
const FIREBASE_URL = 'https://super-team-netflix-default-rtdb.europe-west1.firebasedatabase.app';

async function verify() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const tab = document.getElementById('tab').value;
  const msgDiv = document.getElementById('message');
  
  if (!name || !email || !tab) {
    showMessage('❌ יש למלא את כל השדות', 'error');
    return;
  }
  
  showMessage('⏳ בדיקה...', 'loading');
  
  try {
    const res = await fetch(FIREBASE_URL + '/users.json');
    const users = await res.json() || {};
    
    for (const [key, user] of Object.entries(users)) {
      if (user.name === name && 
          user.email === email && 
          user.tab === tab && 
          user.status === 'approved') {
        // Match found! Redirect to home page
        msgDiv.style.display = 'none';
        const homeUrl = window.location.origin.includes('github.io')
          ? window.location.origin + '/SUPER-TEAM-NETFLIX/'
          : window.location.origin + '/';
        window.location.href = 'academy-hub.html?user=' + encodeURIComponent(email);
        return;
      }
    }
    
    showMessage('❌ הפרטים לא תואמים. בדוק את השדות או צור קשר לטאב שלך', 'error');
    
  } catch(e) {
    showMessage('❌ שגיאה: ' + e.message, 'error');
  }
}

function showMessage(text, type) {
  const msgDiv = document.getElementById('message');
  msgDiv.textContent = text;
  msgDiv.className = 'message ' + type;
  msgDiv.style.display = 'block';
}

document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') verify();
});
</script>
</body>
</html>
