<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Team Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #141414; color: #e5e5e5;
  font-family: 'Heebo', sans-serif;
  min-height: 100vh; padding: 20px;
}
.container {
  max-width: 1200px; margin: 0 auto;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 40px; padding-bottom: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
h1 { font-size: 32px; }
.user-info { font-size: 14px; color: #999; }
.content {
  background: #1a1a1a; border-radius: 10px;
  padding: 40px; text-align: center;
}
.welcome { font-size: 28px; color: #46d369; margin-bottom: 20px; }
.message { font-size: 16px; line-height: 1.8; color: #e5e5e5; margin-bottom: 30px; }
.courses {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px; margin-top: 40px;
}
.course-card {
  background: rgba(229,9,20,0.1); border: 1px solid #e50914;
  border-radius: 8px; padding: 20px; text-align: center;
  cursor: pointer; transition: all 0.3s;
}
.course-card:hover {
  background: rgba(229,9,20,0.15); transform: translateY(-4px);
}
.course-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.course-desc { font-size: 13px; color: #999; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Academy <svg xmlns="http://www.w3.org/2000/svg" width="0.9em" height="0.9em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.08em"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></h1>
    <div class="user-info">
      מחובר כ: <span id="userEmail"></span>
    </div>
  </div>
  
  <div class="content">
    <div class="welcome">ברוכה הבאה לAcademy! <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3z"/></svg></div>
    
    <div class="message">
      <p>אתה קיבלת גישה מלאה לכל הקורסים והחומרים שלנו.</p>
      <p style="margin-top:12px;">בחר קורס כדי להתחיל</p>
    </div>
    
    <div class="courses">
      <div class="course-card">
        <div class="course-title">קורס 1</div>
        <div class="course-desc">יסודות Super Team</div>
      </div>
      <div class="course-card">
        <div class="course-title">קורס 2</div>
        <div class="course-desc">שיפור מיומנויות</div>
      </div>
      <div class="course-card">
        <div class="course-title">קורס 3</div>
        <div class="course-desc">מנהיגות והשראה</div>
      </div>
      <div class="course-card">
        <div class="course-title">קורס 4</div>
        <div class="course-desc">ניהול פרויקטים</div>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('userEmail').textContent = 
  new URLSearchParams(window.location.search).get('user') || 'משתמש';
</script>
</body>
</html>
