<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Team Academy v2</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/build/index.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #141414; 
  color: #e5e5e5; 
  font-family: 'Heebo', sans-serif; 
  min-height: 100vh; 
  padding: 20px;
}
.container { 
  max-width: 500px; 
  margin: 0 auto; 
  background: #1a1a1a; 
  border-radius: 10px; 
  padding: 40px;
}
h1 { font-size: 24px; margin-bottom: 20px; }
.form-group { margin-bottom: 15px; }
label { display: block; margin-bottom: 5px; font-weight: 600; }
input, select { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 4px; background: #0a0a0a; color: #e5e5e5; font-size: 14px; }
button { width: 100%; padding: 12px; background: #e50914; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 700; margin-top: 15px; }
button:hover { background: #b20710; }
.status { margin-top: 15px; padding: 10px; background: #0a0a0a; border-radius: 4px; min-height: 20px; }
.log { margin-top: 15px; padding: 10px; background: #0a0a0a; border-radius: 4px; font-size: 12px; max-height: 150px; overflow-y: auto; }
.screen { display: none; }
.screen.active { display: block; }
</style>
</head>
<body>

<div class="container">

<!-- Screen 1: Register -->
<div id="registerScreen" class="screen active">
<h1>🎓 Super Team Academy v2</h1>

<div class="form-group">
<label>שם:</label>
<input id="name" type="text" placeholder="שם מלא">
</div>

<div class="form-group">
<label>אימייל:</label>
<input id="email" type="email" placeholder="example@gmail.com">
</div>

<div class="form-group">
<label>טלפון:</label>
<input id="phone" type="tel" placeholder="0501234567">
</div>

<div class="form-group">
<label>בחר TAB:</label>
<select id="tab">
<option value="">-- בחר --</option>
<option value="shahafwai@gmail.com">שחף ויצמן</option>
<option value="hodaya1507ohayon@gmail.com">הודיה אוחיון</option>
<option value="Rinati0010@gmail.com">רינת ישראל</option>
<option value="ylasko76@gmail.com">יעל רותם</option>
<option value="Edentibi5@gmail.com">עדן טיבי תדמור</option>
<option value="Lizmeirovich1@gmail.com">ליז מאירוביץ</option>
<option value="Rivkanati@gmail.com">רבקה דהן</option>
<option value="Polly70meirovich@gmail.com">פולי מאירוביץ ויצמן</option>
<option value="nogazrad122@gmail.com">נוגה אזרד</option>
<option value="Michellelesdman@gmail.com">מישל אסא</option>
<option value="maliat1405@gmail.com">מלי עטר</option>
<option value="zfaniadana@gmail.com">דנה צפניה</option>
<option value="guyassa6@gmail.com">גיא אסא</option>
<option value="Adishor2025@gmail.com">עדי שור</option>
<option value="gvanit5560759@walla.com">אסף עטר</option>
<option value="Hadarcohenhlf@gmail.com">הדר כהן</option>
</select>
</div>

<button onclick="doRegister()">רישום</button>

<div id="registerStatus" class="status"></div>
<div id="registerLog" class="log"></div>
</div>

<!-- Screen 2: Pending -->
<div id="pendingScreen" class="screen">
<h1>⏳ בהמתנה לאישור</h1>
<p id="pendingMsg" style="margin: 15px 0; font-size: 16px;"></p>
<button onclick="doCheck()">🔍 בדוק אם אושרתי</button>
<button onclick="doBack()" style="background: #666;">← חזור</button>
<div id="pendingStatus" class="status"></div>
<div id="pendingLog" class="log"></div>
</div>

</div>

<script>
// Config
const FIREBASE_URL = 'https://super-team-netflix-default-rtdb.europe-west1.firebasedatabase.app';
const EMAILJS_PUBLIC_KEY = 'nhwKyEa3uJ8JjmxXQ';
const EMAILJS_SERVICE = 'service_etqui87';
const EMAILJS_TEMPLATE = 'template_6bo4ai9';

// Init EmailJS
(function() {
  emailjs.init(EMAILJS_PUBLIC_KEY);
  console.log('✅ EmailJS initialized');
})();

// Logging
function log(screen, msg) {
  console.log(`[${screen}] ${msg}`);
  const logEl = document.getElementById(`${screen}Log`);
  if (logEl) {
    logEl.innerHTML += msg + '<br>';
    logEl.scrollTop = logEl.scrollHeight;
  }
}

function setStatus(screen, msg) {
  const statusEl = document.getElementById(`${screen}Status`);
  if (statusEl) {
    statusEl.textContent = msg;
  }
}

// Register
async function doRegister() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const tabEmail = document.getElementById('tab').value;

  log('register', `📝 Registration: ${name}, ${email}, ${tabEmail}`);

  // Validate
  if (!name || !email || !phone || !tabEmail) {
    log('register', '❌ Missing fields');
    setStatus('register', '❌ יש למלא את כל השדות');
    return;
  }

  try {
    // Step 1: Firebase
    log('register', '📝 Writing to Firebase...');
    const userKey = Math.random().toString(36).substring(2, 20);

    const firebaseRes = await fetch(`${FIREBASE_URL}/users/${userKey}.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name, email, phone,
        tab: tabEmail,
        status: 'pending',
        registeredAt: new Date().toISOString()
      })
    });

    if (!firebaseRes.ok) {
      throw new Error(`Firebase error: ${firebaseRes.status}`);
    }

    log('register', `✅ User created: ${userKey}`);

    // Step 2: Send Email
    log('register', `📧 Sending email to ${tabEmail}...`);
    const approveUrl = `https://shahafwaitzman.github.io/SUPER-TEAM-NETFLIX/approve-v2.html?key=${userKey}`;

    const emailRes = await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      to_email: tabEmail,
      tab_name: 'TAB',
      user_name: name,
      user_email: email,
      approve_url: approveUrl
    });

    log('register', `✅ Email sent successfully: ${emailRes.status}`);
    setStatus('register', `✅ הרישום בוצע! מייל אישור נשלח.`);

    // Save and show pending
    localStorage.setItem('pending_key', userKey);
    setTimeout(() => {
      document.getElementById('registerScreen').classList.remove('active');
      document.getElementById('pendingScreen').classList.add('active');
      document.getElementById('pendingMsg').textContent = 'בחכות לאישור...';
    }, 1500);

  } catch (error) {
    log('register', `❌ Error: ${error.message}`);
    setStatus('register', `❌ שגיאה: ${error.message}`);
  }
}

// Check Status
async function doCheck() {
  const userKey = localStorage.getItem('pending_key');
  if (!userKey) {
    setStatus('pending', '❌ אין משתמש בהמתנה');
    return;
  }

  try {
    log('pending', `🔍 Checking ${userKey}...`);
    const res = await fetch(`${FIREBASE_URL}/users/${userKey}.json`);
    const user = await res.json();

    if (!user) {
      log('pending', '❌ User not found');
      setStatus('pending', '❌ המשתמש לא נמצא');
      return;
    }

    log('pending', `📊 Status: ${user.status}`);

    if (user.status === 'approved') {
      log('pending', '✅ APPROVED!');
      setStatus('pending', `✅ אושרת! מעבר לאקדמיה...`);
      setTimeout(() => {
        localStorage.removeItem('pending_key');
        window.location.href = 'https://shahafwaitzman.github.io/SUPER-TEAM-NETFLIX/';
      }, 2000);
    } else {
      log('pending', '⏳ Still pending');
      setStatus('pending', `⏳ עדיין בהמתנה לאישור`);
    }
  } catch (error) {
    log('pending', `❌ Error: ${error.message}`);
    setStatus('pending', `❌ שגיאה: ${error.message}`);
  }
}

// Back
function doBack() {
  localStorage.removeItem('pending_key');
  document.getElementById('pendingScreen').classList.remove('active');
  document.getElementById('registerScreen').classList.add('active');
}

// Auto-check every 5 seconds
setInterval(() => {
  if (document.getElementById('pendingScreen').classList.contains('active')) {
    doCheck();
  }
}, 5000);

// Init
console.log('✅ Page loaded');
</script>

</body>
</html>
