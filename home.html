<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Team Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #141414; color: #e5e5e5;
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.container {
  max-width: 500px; width: 100%;
  text-align: center;
}
.logo {
  font-size: 48px; margin-bottom: 20px;
}
h1 {
  font-size: 32px; color: #fff;
  margin-bottom: 10px; font-weight: 900;
}
.subtitle {
  font-size: 16px; color: #999;
  margin-bottom: 40px;
}
.buttons {
  display: flex; flex-direction: column; gap: 16px;
}
.btn {
  padding: 16px 24px;
  border: none; border-radius: 6px;
  font-size: 18px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  transition: all 0.3s;
  text-decoration: none; display: block;
}
.btn-primary {
  background: #e50914; color: #fff;
}
.btn-primary:hover {
  background: #b20710; transform: scale(1.02);
}
.btn-secondary {
  background: transparent; color: #e5e5e5;
  border: 2px solid #e50914;
}
.btn-secondary:hover {
  background: rgba(229,9,20,0.1); border-color: #fff;
}
.footer {
  margin-top: 40px; font-size: 12px; color: #666;
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🎓</div>
  <h1>Super Team Academy</h1>
  <p class="subtitle">ברוכים הבאים לאקדמיה</p>
  
  <div class="buttons">
    <a href="access.html" class="btn btn-primary">
      👥 לקוחות קיימים
    </a>
    <a href="register.html" class="btn btn-secondary">
      📝 בקשת אישור חדשה
    </a>
  </div>
  
  <div class="footer">
    <p>© 2026 Super Team Academy</p>
  </div>
</div>
</body>
</html>
