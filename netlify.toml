[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 301

[[redirects]]
  from = "/admin/"
  to = "/admin.html"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  port = 8888
  publish = "."

[context.production]
  command = "echo 'Production build'"
  publish = "."
