<style>
:root {
  --nflx-bg: #141414;
  --nflx-red: #E50914;
  --nflx-red-dark: #B9090B;
  --nflx-text: #FFFFFF;
  --nflx-text-muted: #AAAAAA;
  --nflx-header-height: 70px;
  --stadium-img: url('hero.jpg');
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; min-height: 100vh; overflow-x: hidden; }
body {
  font-family: 'Heebo', 'Helvetica Neue', sans-serif;
  background: var(--nflx-bg);
  color: var(--nflx-text);
  line-height: 1.2;
  -webkit-font-smoothing: antialiased;
  position: relative;
}
a { color: inherit; text-decoration: none; }

body::before {
  content: ""; position: fixed; inset: 0; z-index: 0;
  background-image: var(--stadium-img);
  background-size: cover; background-position: center 30%;
  filter: contrast(1.08) saturate(1.12) brightness(0.6);
  transform: scale(1.02);
}
body::after {
  content: ""; position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(180deg,
    rgba(20,20,20,0.6) 0%,
    rgba(20,20,20,0.85) 50%,
    rgba(20,20,20,0.95) 100%);
}

/* NAVBAR */
.main-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nflx-header-height);
  display: flex; align-items: center;
  padding: 0 48px;
  z-index: 100;
  background: linear-gradient(rgba(0,0,0,0.7) 10%, rgba(0,0,0,0));
}
.logo {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin-left: 32px;
  text-transform: uppercase;
  user-select: none; line-height: 1;
}
.logo-super {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 11px;
  color: #fff; letter-spacing: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
.logo-line {
  width: 44px; height: 1.5px;
  background: linear-gradient(to right, transparent 0%, #fff 50%, transparent 100%);
  margin: 4px 0; border-radius: 2px;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
}
.logo-academy {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 18px;
  color: var(--nflx-red); letter-spacing: 1.5px;
  text-shadow: 0 2px 8px rgba(229,9,20,0.5), 0 1px 3px rgba(0,0,0,0.8);
}

/* Container */
.page-container {
  position: relative; z-index: 10;
  min-height: 100vh;
  padding: calc(var(--nflx-header-height) + 40px) 20px 40px;
  display: flex; align-items: center; justify-content: center;
}

.form-card {
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 48px 44px;
  max-width: 500px; width: 100%;
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.form-eyebrow {
  font-size: 11px;
  color: var(--nflx-red);
  letter-spacing: 4px;
  font-weight: 700;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.form-title {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.form-subtitle {
  font-size: 14px;
  color: var(--nflx-text-muted);
  margin-bottom: 32px;
}

.form-group { margin-bottom: 18px; }
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  color: #fff;
  font-size: 13px;
  letter-spacing: 0.3px;
}
input, select {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.2s;
}
input::placeholder { color: rgba(255,255,255,0.4); }
input:focus, select:focus {
  border-color: var(--nflx-red);
  background: rgba(255,255,255,0.08);
  outline: none;
  box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
}
select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='white' d='M6 8L0 0h12z'/></svg>");
  background-repeat: no-repeat;
  background-position: left 16px center;
  padding-left: 40px;
}
select option {
  background: #141414;
  color: #fff;
}

.submit-btn {
  width: 100%;
  padding: 14px;
  background: var(--nflx-red);
  border: none;
  border-radius: 4px;
  color: #fff;
  cursor: pointer;
  font-weight: 700;
  margin-top: 12px;
  font-family: inherit;
  font-size: 16px;
  letter-spacing: 0.5px;
  transition: background 0.2s, transform 0.2s;
}
.submit-btn:hover {
  background: var(--nflx-red-dark);
  transform: translateY(-1px);
}
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.status {
  margin-top: 16px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.05);
  border-right: 3px solid transparent;
  border-radius: 4px;
  font-size: 13px;
  display: none;
  line-height: 1.5;
}
.status.error { border-right-color: #ff5757; color: #ff8787; }
.status.success { border-right-color: #46d369; color: #7ae595; }
.status.loading { border-right-color: var(--nflx-red); color: #fff; }

.back-link {
  text-align: center;
  margin-top: 24px;
}
.back-link a {
  color: var(--nflx-text-muted);
  font-size: 13px;
  transition: color 0.2s;
}
.back-link a:hover { color: #fff; }

@media (max-width: 600px) {
  .main-header { padding: 0 16px; }
  .page-container { padding: calc(var(--nflx-header-height) + 20px) 16px 20px; }
  .form-card { padding: 32px 24px; }
  .form-title { font-size: 30px; }
}






.nav-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  margin-left: auto;
  background: linear-gradient(135deg, #E50914, #B9090B);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  box-shadow: 0 2px 8px rgba(229,9,20,0.3);
  white-space: nowrap;
  font-family: inherit;
  order: 999;
}
.nav-back-btn:hover {
  transform: translateX(-2px);
  box-shadow: 0 4px 12px rgba(229,9,20,0.5);
  opacity: 0.95;
}
.nav-back-btn svg {
  width: 14px; height: 14px;
  transition: transform 0.2s;
}
.nav-back-btn:hover svg {
  transform: translateX(-3px);
}
@media (max-width: 600px) {
  .nav-back-btn { padding: 6px 10px; font-size: 11px; }
  .nav-back-btn .back-label { display: none; }
}




/* ═══════════════════════════════════════════
   ELEGANT TEXT READABILITY (soft shadows like Netflix)
   ═══════════════════════════════════════════ */
.choice-title, .choice-description,
.hero-title, .hero-subtitle, .hero-title-academy,
.form-title, .billboard-title, .synopsis, .rowTitle,
.welcome-title, .welcome-subtitle,
.success-title, .success-eyebrow,
.logo-super, .logo-academy,
.card-title, .card-meta, .boxart-label {
  text-shadow:
    0 1px 2px rgba(0,0,0,0.6),
    0 2px 8px rgba(0,0,0,0.85),
    0 0 20px rgba(0,0,0,0.35) !important;
}

/* Deeper shadow for large hero-style text */
.hero-title, .billboard-title, .welcome-title, .form-title, .success-title {
  text-shadow:
    0 2px 4px rgba(0,0,0,0.7),
    0 4px 16px rgba(0,0,0,0.9),
    0 0 24px rgba(0,0,0,0.5) !important;
}

/* Red accent text keeps its colored glow */
.hero-title-academy, .logo-academy {
  text-shadow:
    0 2px 8px rgba(229,9,20,0.4),
    0 2px 4px rgba(0,0,0,0.9),
    0 4px 16px rgba(0,0,0,0.8) !important;
}

/* Don't apply shadow to text on solid/white buttons */
.color-primary, .color-primary span,
.submit-btn, .btn-primary,
.choice-cta, .nflx-btn.color-primary {
  text-shadow: none !important;
}

/* Subtle lift only for small labels on dark backgrounds */
.welcome-eyebrow, .form-eyebrow, .choice-badge,
.card-badge, .nav-back-btn span {
  text-shadow: 0 1px 2px rgba(0,0,0,0.6) !important;
}

/* ═══════════════════════════════════════════
   MOBILE TAP TARGETS (44x44 minimum for accessibility)
   ═══════════════════════════════════════════ */
@media (max-width: 600px) {
  .nav-back-btn {
    min-width: 44px;
    min-height: 44px;
    padding: 10px 12px !important;
    justify-content: center;
  }
  .logout-btn {
    min-height: 44px;
    padding: 10px 16px !important;
  }
  .back-link a, a[href="entry.html"].back-link {
    display: inline-block;
    min-height: 44px;
    padding: 12px 16px !important;
    line-height: 20px;
  }
  .back-link {
    padding: 4px 0;
  }
  .nav-icon-btn {
    min-width: 44px;
    min-height: 44px;
  }
  .logo {
    min-height: 44px;
    padding: 6px 8px;
  }
  .user-avatar, .profile-icon {
    min-width: 44px;
    min-height: 44px;
  }
  /* Form submit buttons full-width min 48px */
  .submit-btn, .btn-primary, .btn-secondary, .nflx-btn {
    min-height: 48px;
  }
}





/* ═════ Shared hero background (crowd + Israeli flag) ═════ */
body.stn-bg-hero {
  position: relative;
  background-color: #0a0a0a;
}
body.stn-bg-hero::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url('hero.jpg');
  background-size: cover;
  background-position: center 30%;
  opacity: 0.35;
  z-index: -2;
  pointer-events: none;
  filter: contrast(1.05) saturate(1.1) brightness(0.9);
}
body.stn-bg-hero::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 30%, rgba(229,9,20,0.12), transparent 70%),
    linear-gradient(180deg, rgba(10,10,10,0.55) 0%, rgba(10,10,10,0.75) 45%, rgba(10,10,10,0.92) 100%);

  pointer-events: none;
}

body.stn-installed { padding-top: 68px; margin: 0; }
.stn-bar {
  position: fixed; top: 0; left: 0; right: 0;

.stn-logo .stn-logo-super { font-family: 'Bebas Neue','Heebo',sans-serif; font-weight: 900; font-size: 11px; color: #fff; letter-spacing: 2.2px; }

.stn-logo .stn-logo-brand { font-family: 'Bebas Neue','Heebo',sans-serif; font-weight: 900; font-size: 19px; color: #E50914; letter-spacing: 1.6px; text-shadow: 0 2px 8px rgba(229,9,20,0.45); }
.stn-right { flex-shrink: 0; display: inline-flex; align-items: center; gap: 8px; }
.stn-ham-wrap { position: relative; }
.stn-ham-btn { width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; background: transparent; border: none; color: rgba(255,255,255,0.75); cursor: pointer; padding: 0; transition: all 0.15s; }
.stn-ham-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.stn-ham-btn svg { width: 18px; height: 18px; fill: currentColor; }
.stn-ham-menu { position: absolute; top: calc(100% + 10px); left: auto; right: 0; min-width: 240px; max-height: calc(100vh - 88px); overflow-y: auto; background: rgba(18,18,18,0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; box-shadow: 0 18px 40px rgba(0,0,0,0.6); padding: 8px 0; display: none; flex-direction: column; z-index: 1100; }
.stn-ham-menu.open { display: flex; }
.stn-ham-header { font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1.4px; padding: 10px 18px 6px; }
.stn-ham-link { display: flex; align-items: center; gap: 12px; padding: 12px 18px; color: #fff; font-size: 13px; font-weight: 600; text-decoration: none; transition: background 0.15s; border: none; background: transparent; font-family: inherit; text-align: right; cursor: pointer; width: 100%; }
.stn-ham-link:hover { background: rgba(255,255,255,0.08); }
.stn-ham-link.active { background: rgba(229,9,20,0.2); border-inline-end: 3px solid #E50914; }
.stn-ham-link-brand { font-family: 'Bebas Neue','Heebo',sans-serif; font-size: 13px; letter-spacing: 1.5px; color: #E50914; margin-inline-start: auto; }
.stn-ham-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 6px 0; }

/* TABS: right-aligned (start of RTL), NOT centered */
.stn-tabs {
  flex: 0 1 auto;
  display: inline-flex; align-items: center;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  min-width: 0;
}
.stn-tabs::-webkit-scrollbar { display: none; }
.stn-tab { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; background: transparent; border: none; color: rgba(255,255,255,0.75); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: color 0.15s, background 0.15s; white-space: nowrap; }
.stn-tab:hover { color: #fff; background: rgba(255,255,255,0.08); }
.stn-tab.active { background: #E50914; color: #fff; font-weight: 600; }
.stn-tab svg { width: 14px; height: 14px; fill: currentColor; }

/* LEFT CLUSTER: pushed to the visual end with margin-inline-start: auto */
.stn-left {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 2px;
  margin-inline-start: auto;  /* <-- pushes to visual left end in RTL */
}

@media (max-width: 900px) {
  .stn-bar { gap: 6px; padding: 0 12px; height: 60px; }
  body.stn-installed { padding-top: 60px; }
  .stn-tab-label { display: none; }
  .stn-tab { padding: 7px 10px; font-size: 13px; }
  .stn-logo .stn-logo-brand { font-size: 16px; }
  .stn-logo .stn-logo-super { font-size: 10px; }
  .stn-tabs { flex: 1 1 auto; }  /* on mobile, tabs grow to fill remaining space */
}
@media (max-width: 560px) {
  .stn-bar { gap: 4px; padding: 0 8px; }
  .stn-tab { padding: 6px 8px; font-size: 12px; }
  .stn-ham-btn { width: 34px; height: 34px; }
  .stn-ham-btn svg { width: 16px; height: 16px; }
}
/* ═════ /v6 ═════ */

<script>
/* =================================================================
   Registration form — sends approval request to the selected TAB
   ================================================================= */
(function() {
  // --- Config (matches index-v2.html) ---
  var FIREBASE_URL     = 'https://super-team-netflix-default-rtdb.europe-west1.firebasedatabase.app';
  var EMAILJS_PUBLIC   = 'nhwKyEa3uJ8JjmxXQ';
  var EMAILJS_SERVICE  = 'service_etqui87';
  var EMAILJS_TEMPLATE = 'template_6bo4ai9';
  var APPROVE_BASE     = 'https://superteamhlf.team/approve-v2.html';

  // TAB roster — keep in sync with the <select> above
  var TAB_ROSTER = {
    'shahafwai@gmail.com':         'שחף ויצמן',
    'hodaya1507ohayon@gmail.com':  'הודיה אוחיון',
    'Rinati0010@gmail.com':        'רינת ישראל',
    'ylasko76@gmail.com':          'יעל רותם',
    'Edentibi5@gmail.com':         'עדן טיבי תדמור',
    'Lizmeirovich1@gmail.com':     'ליז מאירוביץ',
    'Rivkanati@gmail.com':         'רבקה דהן',
    'Polly70meirovich@gmail.com':  'פולי מאירוביץ ויצמן',
    'nogazrad122@gmail.com':       'נוגה אזרד',
    'Michellelesdman@gmail.com':   'מישל אסא',
    'maliat1405@gmail.com':        'מלי עטר',
    'zfaniadana@gmail.com':        'דנה צפניה',
    'guyassa6@gmail.com':          'גיא אסא',
    'Adishor2025@gmail.com':       'עדי שור',
    'gvanit5560759@walla.com':     'אסף עטר',
    'Hadarcohenhlf@gmail.com':     'הדר כהן',
    'Yahavyamin79@gmail.com':      'יהב מעודי'
  };

  // Init EmailJS
  if (typeof emailjs !== 'undefined') {
    try { emailjs.init(EMAILJS_PUBLIC); } catch(e) { console.warn('EmailJS init:', e); }
  }

  /** Israeli phone → 972XXXXXXXXX for wa.me links */
  function toIlWhatsapp(phone) {
    if (!phone) return '';
    var digits = String(phone).replace(/\D/g, '');
    if (digits.indexOf('972') === 0) return digits;
    if (digits.indexOf('0') === 0) return '972' + digits.substring(1);
    return '972' + digits;
  }

  function setStatus(msg, ok) {
    var el = document.getElementById('status');
    if (!el) return;
    el.textContent = msg || '';
    el.style.color = ok ? '#10b981' : (msg ? '#ef4444' : '');
  }

  function showSuccess(tabName, tabWa) {
    var form = document.querySelector('.form-card') || document.querySelector('form') || document.getElementById('status').parentElement;
    if (!form) return;
    var html = ''
      + '<div style="text-align:center; padding:10px 4px;">'
      + '  <div style="font-size:48px; margin-bottom:12px;">✅</div>'
      + '  <h2 style="font-size:22px; margin-bottom:10px;">הבקשה נשלחה!</h2>'
      + '  <p style="color:rgba(255,255,255,0.75); margin-bottom:18px; line-height:1.6;">'
      + '    שלחנו מייל ל-<b>' + tabName + '</b> לאישור.<br>'
      + '    אפשר גם לשלוח הודעה ישירה בוואטסאפ כדי לזרז.'
      + '  </p>'
      + (tabWa
          ? '  <a href="' + tabWa + '" target="_blank" rel="noopener" '
          + '     style="display:inline-flex; align-items:center; gap:8px; background:#25D366; color:#fff; padding:12px 22px; border-radius:8px; font-weight:700; text-decoration:none; margin-bottom:10px;">'
          + '    💬 הודעה בוואטסאפ'
          + '  </a><br>'
          : '')
      + '  <a href="entry.html" style="color:#aaa; font-size:14px;">← חזרה למסך הבית</a>'
      + '</div>';
    // Replace form contents with success panel
    var card = document.querySelector('.form-card');
    if (card) card.innerHTML = html;
  }

  async function submitForm() {
    var btn = document.getElementById('submitBtn');
    var name = (document.getElementById('name').value || '').trim();
    var email = (document.getElementById('email').value || '').trim();
    var phone = (document.getElementById('phone').value || '').trim();
    var tabEmail = document.getElementById('tab').value;

    // Validation
    if (!name || !email || !phone || !tabEmail) {
      setStatus('❌ יש למלא את כל השדות', false);
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      setStatus('❌ כתובת מייל לא תקינה', false);
      return;
    }
    if (!TAB_ROSTER[tabEmail]) {
      setStatus('❌ בחר/י חבר/ת טאב מהרשימה', false);
      return;
    }

    var tabName = TAB_ROSTER[tabEmail];
    btn.disabled = true;
    btn.textContent = 'שולח...';
    setStatus('');

    try {
      // 1) Write to Firebase (creates pending user)
      var userKey = Math.random().toString(36).substring(2, 20);
      var fbRes = await fetch(FIREBASE_URL + '/users/' + userKey + '.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: name,
          email: email,
          phone: phone,
          tab: tabEmail,
          tabName: tabName,
          status: 'pending',
          registeredAt: new Date().toISOString()
        })
      });
      if (!fbRes.ok) throw new Error('Firebase ' + fbRes.status);

      // 2) Build links
      var approveUrl = APPROVE_BASE + '?key=' + userKey;
      var userWa = toIlWhatsapp(phone);
      var waToUser = userWa
        ? 'https://wa.me/' + userWa + '?text=' + encodeURIComponent('היי ' + name + ', ראיתי את הבקשה שלך לאקדמיה 🙌')
        : '';

      // 3) Send email to TAB member
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
        to_email:    tabEmail,
        tab_name:    tabName,
        user_name:   name,
        user_email:  email,
        user_phone:  phone,
        approve_url: approveUrl,
        whatsapp_url: waToUser
      });

      // 4) Save key locally so user's pending screen can poll
      try { localStorage.setItem('pending_key', userKey); } catch(e) {}

      // 5) Build WhatsApp link FROM user TO the TAB (using TAB's own wa if we had it).
      //    We don't store TAB phones, so we skip WA link on success and just show a
      //    friendly confirmation. (The approval link goes in the email.)
      showSuccess(tabName, '');

    } catch (err) {
      console.error(err);
      setStatus('❌ שגיאה בשליחה: ' + (err.message || err), false);
      btn.disabled = false;
      btn.textContent = 'שלח בקשה';
    }
  }

  // Expose to the inline onclick
  window.submitForm = submitForm;
})();

(function() {
  function init() {
    if (document.body) document.body.classList.add('stn-installed');
    window.addEventListener('scroll', function() { var b = document.getElementById('stnBar'); if (b) b.classList.toggle('scrolled', window.scrollY > 20); });
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('#stnHamBtn'); var menu = document.getElementById('stnHamMenu');
      if (btn && menu) { e.stopPropagation(); menu.classList.toggle('open'); return; }
      if (menu && menu.classList.contains('open') && !e.target.closest('.stn-ham-wrap')) menu.classList.remove('open');
    });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { var m = document.getElementById('stnHamMenu'); if (m) m.classList.remove('open'); } });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
