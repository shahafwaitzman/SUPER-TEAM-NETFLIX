<style>
:root {
  --nflx-bg: #141414;
  --nflx-red: #E50914;
  --nflx-red-dark: #B9090B;
  --nflx-text: #FFFFFF;
  --nflx-text-muted: #AAAAAA;
  --nflx-header-height: 70px;
  --stadium-img: url('hero.jpg');
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; min-height: 100vh; overflow-x: hidden; }
body {
  font-family: 'Heebo', 'Helvetica Neue', sans-serif;
  background: var(--nflx-bg);
  color: var(--nflx-text);
  line-height: 1.2;
  -webkit-font-smoothing: antialiased;
  position: relative;
}
a { color: inherit; text-decoration: none; }

body::before {
  content: ""; position: fixed; inset: 0; z-index: 0;
  background-image: var(--stadium-img);
  background-size: cover; background-position: center 30%;
  filter: contrast(1.08) saturate(1.12) brightness(0.6);
  transform: scale(1.02);
}
body::after {
  content: ""; position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(180deg,
    rgba(20,20,20,0.6) 0%,
    rgba(20,20,20,0.85) 50%,
    rgba(20,20,20,0.95) 100%);
}

/* NAVBAR */
.main-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nflx-header-height);
  display: flex; align-items: center;
  padding: 0 48px;
  z-index: 100;
  background: linear-gradient(rgba(0,0,0,0.7) 10%, rgba(0,0,0,0));
}
.logo {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin-left: 32px;
  text-transform: uppercase;
  user-select: none; line-height: 1;
}
.logo-super {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 11px;
  color: #fff; letter-spacing: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
.logo-line {
  width: 44px; height: 1.5px;
  background: linear-gradient(to right, transparent 0%, #fff 50%, transparent 100%);
  margin: 4px 0; border-radius: 2px;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
}
.logo-academy {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 18px;
  color: var(--nflx-red); letter-spacing: 1.5px;
  text-shadow: 0 2px 8px rgba(229,9,20,0.5), 0 1px 3px rgba(0,0,0,0.8);
}

/* Container */
.page-container {
  position: relative; z-index: 10;
  min-height: 100vh;
  padding: calc(var(--nflx-header-height) + 40px) 20px 40px;
  display: flex; align-items: center; justify-content: center;
}

.form-card {
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 48px 44px;
  max-width: 500px; width: 100%;
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.form-eyebrow {
  font-size: 11px;
  color: var(--nflx-red);
  letter-spacing: 4px;
  font-weight: 700;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.form-title {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.form-subtitle {
  font-size: 14px;
  color: var(--nflx-text-muted);
  margin-bottom: 32px;
}

.form-group { margin-bottom: 18px; }
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  color: #fff;
  font-size: 13px;
  letter-spacing: 0.3px;
}
input, select {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.2s;
}
input::placeholder { color: rgba(255,255,255,0.4); }
input:focus, select:focus {
  border-color: var(--nflx-red);
  background: rgba(255,255,255,0.08);
  outline: none;
  box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
}
select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='white' d='M6 8L0 0h12z'/></svg>");
  background-repeat: no-repeat;
  background-position: left 16px center;
  padding-left: 40px;
}
select option {
  background: #141414;
  color: #fff;
}

.submit-btn {
  width: 100%;
  padding: 14px;
  background: var(--nflx-red);
  border: none;
  border-radius: 4px;
  color: #fff;
  cursor: pointer;
  font-weight: 700;
  margin-top: 12px;
  font-family: inherit;
  font-size: 16px;
  letter-spacing: 0.5px;
  transition: background 0.2s, transform 0.2s;
}
.submit-btn:hover {
  background: var(--nflx-red-dark);
  transform: translateY(-1px);
}
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.status {
  margin-top: 16px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.05);
  border-right: 3px solid transparent;
  border-radius: 4px;
  font-size: 13px;
  display: none;
  line-height: 1.5;
}
.status.error { border-right-color: #ff5757; color: #ff8787; }
.status.success { border-right-color: #46d369; color: #7ae595; }
.status.loading { border-right-color: var(--nflx-red); color: #fff; }

.back-link {
  text-align: center;
  margin-top: 24px;
}
.back-link a {
  color: var(--nflx-text-muted);
  font-size: 13px;
  transition: color 0.2s;
}
.back-link a:hover { color: #fff; }

@media (max-width: 600px) {
  .main-header { padding: 0 16px; }
  .page-container { padding: calc(var(--nflx-header-height) + 20px) 16px 20px; }
  .form-card { padding: 32px 24px; }
  .form-title { font-size: 30px; }
}






.nav-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  margin-left: auto;
  background: linear-gradient(135deg, #E50914, #B9090B);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  box-shadow: 0 2px 8px rgba(229,9,20,0.3);
  white-space: nowrap;
  font-family: inherit;
  order: 999;
}
.nav-back-btn:hover {
  transform: translateX(-2px);
  box-shadow: 0 4px 12px rgba(229,9,20,0.5);
  opacity: 0.95;
}
.nav-back-btn svg {
  width: 14px; height: 14px;
  transition: transform 0.2s;
}
.nav-back-btn:hover svg {
  transform: translateX(-3px);
}
@media (max-width: 600px) {
  .nav-back-btn { padding: 6px 10px; font-size: 11px; }
  .nav-back-btn .back-label { display: none; }
}




/* ═══════════════════════════════════════════
   ELEGANT TEXT READABILITY (soft shadows like Netflix)
   ═══════════════════════════════════════════ */
.choice-title, .choice-description,
.hero-title, .hero-subtitle, .hero-title-academy,
.form-title, .billboard-title, .synopsis, .rowTitle,
.welcome-title, .welcome-subtitle,
.success-title, .success-eyebrow,
.logo-super, .logo-academy,
.card-title, .card-meta, .boxart-label {
  text-shadow:
    0 1px 2px rgba(0,0,0,0.6),
    0 2px 8px rgba(0,0,0,0.85),
    0 0 20px rgba(0,0,0,0.35) !important;
}

/* Deeper shadow for large hero-style text */
.hero-title, .billboard-title, .welcome-title, .form-title, .success-title {
  text-shadow:
    0 2px 4px rgba(0,0,0,0.7),
    0 4px 16px rgba(0,0,0,0.9),
    0 0 24px rgba(0,0,0,0.5) !important;
}

/* Red accent text keeps its colored glow */
.hero-title-academy, .logo-academy {
  text-shadow:
    0 2px 8px rgba(229,9,20,0.4),
    0 2px 4px rgba(0,0,0,0.9),
    0 4px 16px rgba(0,0,0,0.8) !important;
}

/* Don't apply shadow to text on solid/white buttons */
.color-primary, .color-primary span,
.submit-btn, .btn-primary,
.choice-cta, .nflx-btn.color-primary {
  text-shadow: none !important;
}

/* Subtle lift only for small labels on dark backgrounds */
.welcome-eyebrow, .form-eyebrow, .choice-badge,
.card-badge, .nav-back-btn span {
  text-shadow: 0 1px 2px rgba(0,0,0,0.6) !important;
}

/* ═══════════════════════════════════════════
   MOBILE TAP TARGETS (44x44 minimum for accessibility)
   ═══════════════════════════════════════════ */
@media (max-width: 600px) {
  .nav-back-btn {
    min-width: 44px;
    min-height: 44px;
    padding: 10px 12px !important;
    justify-content: center;
  }
  .logout-btn {
    min-height: 44px;
    padding: 10px 16px !important;
  }
  .back-link a, a[href="entry.html"].back-link {
    display: inline-block;
    min-height: 44px;
    padding: 12px 16px !important;
    line-height: 20px;
  }
  .back-link {
    padding: 4px 0;
  }
  .nav-icon-btn {
    min-width: 44px;
    min-height: 44px;
  }
  .logo {
    min-height: 44px;
    padding: 6px 8px;
  }
  .user-avatar, .profile-icon {
    min-width: 44px;
    min-height: 44px;
  }
  /* Form submit buttons full-width min 48px */
  .submit-btn, .btn-primary, .btn-secondary, .nflx-btn {
    min-height: 48px;
  }
}





/* ═════ Shared hero background (crowd + Israeli flag) ═════ */
body.stn-bg-hero {
  position: relative;
  background-color: #0a0a0a;
}
body.stn-bg-hero::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url('hero.jpg');
  background-size: cover;
  background-position: center 30%;
  opacity: 0.35;
  z-index: -2;
  pointer-events: none;
  filter: contrast(1.05) saturate(1.1) brightness(0.9);
}
body.stn-bg-hero::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 30%, rgba(229,9,20,0.12), transparent 70%),
    linear-gradient(180deg, rgba(10,10,10,0.55) 0%, rgba(10,10,10,0.75) 45%, rgba(10,10,10,0.92) 100%);
  z-index: -1;
  pointer-events: none;
}

/* ═════ Super Team Nav — final (retention-spec) ═════ */
body.stn-installed { padding-top: 68px; margin: 0; }

.stn-bar {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000; height: 68px;
  display: flex; align-items: center;
  gap: 16px; padding: 0 24px;
  background: rgba(10,10,10,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-family: 'Heebo', 'Segoe UI', Arial, sans-serif;
  direction: rtl;
}
.stn-bar.scrolled { background: rgba(10,10,10,0.97); }

.stn-logo {
  flex-shrink: 0;
  display: inline-flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-decoration: none; user-select: none;
  line-height: 1; padding: 4px 0;
}
.stn-logo .stn-logo-super {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 11px;
  color: #fff; letter-spacing: 2.2px;
}
.stn-logo .stn-logo-line {
  width: 44px; height: 1.5px;
  background: linear-gradient(to right, transparent, #fff, transparent);
  margin: 3px 0; border-radius: 2px;
}
.stn-logo .stn-logo-brand {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 19px;
  color: #E50914; letter-spacing: 1.6px;
  text-shadow: 0 2px 8px rgba(229,9,20,0.45);
}

/* Right cluster: logo + hamburger */
.stn-right {
  flex-shrink: 0;
  display: inline-flex; align-items: center;
  gap: 8px;
  order: 0;
}

/* Hamburger */
.stn-ham-wrap { position: relative; }
.stn-ham-btn {
  width: 38px; height: 38px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: transparent; border: none;
  color: rgba(255,255,255,0.75);
  cursor: pointer; padding: 0;
  transition: all 0.15s;
}
.stn-ham-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.stn-ham-btn svg { width: 18px; height: 18px; fill: currentColor; }
.stn-ham-menu {
  position: absolute;
  top: calc(100% + 10px);
  inset-inline-end: 0;
  min-width: 240px;
  background: rgba(18,18,18,0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.6);
  padding: 8px 0;
  display: none; flex-direction: column;
  z-index: 1100;
}
.stn-ham-menu.open { display: flex; }
.stn-ham-header {
  font-size: 10px; font-weight: 800;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase; letter-spacing: 1.4px;
  padding: 10px 18px 6px;
}
.stn-ham-link {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px;
  color: #fff;
  font-size: 13px; font-weight: 600;
  text-decoration: none;
  transition: background 0.15s;
  border: none; background: transparent;
  font-family: inherit; text-align: right;
  cursor: pointer; width: 100%;
}
.stn-ham-link:hover { background: rgba(255,255,255,0.08); }
.stn-ham-link.active {
  background: rgba(229,9,20,0.2);
  border-inline-end: 3px solid #E50914;
}
.stn-ham-link-brand {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-size: 13px; letter-spacing: 1.5px;
  color: #E50914;
  margin-inline-start: auto;
}
.stn-ham-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 6px 0; }

/* Middle: tabs */
.stn-tabs {
  flex: 1;
  display: inline-flex; align-items: center;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  justify-content: center;
  order: 1;
}
.stn-tabs::-webkit-scrollbar { display: none; }

.stn-tab {
  display: inline-flex; align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 7px;
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.75);
  font-family: inherit;
  font-size: 14px; font-weight: 500;
  cursor: pointer; text-decoration: none;
  transition: color 0.15s, background 0.15s;
  white-space: nowrap;
}
.stn-tab:hover { color: #fff; background: rgba(255,255,255,0.08); }
.stn-tab.active,
.stn-tab[aria-current="page"] {
  background: #E50914;
  color: #fff;
  font-weight: 600;
}
.stn-tab svg { width: 14px; height: 14px; fill: currentColor; }

/* Left cluster: back + home */
.stn-left {
  flex-shrink: 0;
  display: inline-flex; align-items: center;
  gap: 2px;
  order: 2;
}

@media (max-width: 900px) {
  .stn-bar { gap: 8px; padding: 0 14px; height: 60px; }
  body.stn-installed { padding-top: 60px; }
  .stn-tab-label { display: none; }
  .stn-tab { padding: 7px 10px; font-size: 13px; }
  .stn-logo .stn-logo-brand { font-size: 16px; }
  .stn-logo .stn-logo-super { font-size: 10px; }
}
/* ═════ /final ═════ */

<script>
(function() {
  function init() {
    if (document.body) document.body.classList.add('stn-installed');
    window.addEventListener('scroll', function() { var b = document.getElementById('stnBar'); if (b) b.classList.toggle('scrolled', window.scrollY > 20); });
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('#stnHamBtn'); var menu = document.getElementById('stnHamMenu');
      if (btn && menu) { e.stopPropagation(); menu.classList.toggle('open'); return; }
      if (menu && menu.classList.contains('open') && !e.target.closest('.stn-ham-wrap')) menu.classList.remove('open');
    });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { var m = document.getElementById('stnHamMenu'); if (m) m.classList.remove('open'); } });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
