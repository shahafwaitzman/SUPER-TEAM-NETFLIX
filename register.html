<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בקשת אישור - Super Team Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
  color: #e5e5e5;
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 500px;
  width: 100%;
  background: rgba(26,26,46,0.6);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  padding: 50px 40px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.15);
}
h1 {
  font-size: 28px;
  margin-bottom: 10px;
  color: #ffffff;
  font-weight: 900;
  letter-spacing: -1px;
}
.subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 40px;
}
.form-group {
  margin-bottom: 20px;
}
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  color: #ffffff;
  font-size: 14px;
}
input, select {
  width: 100%;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  background: rgba(0,0,0,0.2);
  color: #ffffff;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.3s ease;
}
input:focus, select:focus {
  border-color: rgba(255,255,255,0.4);
  background: rgba(0,0,0,0.3);
  outline: none;
  box-shadow: 0 0 10px rgba(204,51,51,0.2);
}
button {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  color: #ffffff;
  cursor: pointer;
  font-weight: 700;
  margin-top: 20px;
  font-family: inherit;
  font-size: 15px;
  transition: all 0.3s ease;
}
button:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.5);
  box-shadow: 0 8px 16px rgba(0,0,0,0.25);
  transform: translateY(-2px);
}
.status {
  margin-top: 15px;
  padding: 12px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  min-height: 20px;
  font-size: 14px;
  display: none;
}
.error {
  color: #ff6b6b;
}
.success {
  color: #46d369;
}
.back {
  text-align: center;
  margin-top: 24px;
}
.back a {
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 14px;
  transition: all 0.3s ease;
}
.back a:hover {
  color: #ffffff;
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="container">
  <h1>📝 בקשת אישור חדשה</h1>
  <p class="subtitle">הזן את פרטיך כדי לבקש גישה</p>
  
  <div class="form-group">
    <label>שם מלא *</label>
    <input type="text" id="name" placeholder="שם מלא">
  </div>
  
  <div class="form-group">
    <label>אימייל *</label>
    <input type="email" id="email" placeholder="example@gmail.com">
  </div>
  
  <div class="form-group">
    <label>טלפון *</label>
    <input type="tel" id="phone" placeholder="050-1234567">
  </div>
  
  <div class="form-group">
    <label>בחר TAB *</label>
    <select id="tab">
      <option value="">-- בחר TAB --</option>
      <option value="shahafwai@gmail.com">שחף ויצמן</option>
      <option value="other@example.com">אחר</option>
    </select>
  </div>
  
  <button onclick="submitForm()">שלח בקשה</button>
  
  <div class="status" id="status"></div>

  <div class="back">
    <a href="entry.html">← חזור</a>
  </div>
</div>

<script>
const FIREBASE_URL = 'https://super-team-netflix-default-rtdb.europe-west1.firebasedatabase.app';
emailjs.init('nhwKyEa3uJ8JjmxXQ');

function log(msg) {
  console.log('[register] ' + msg);
  const status = document.getElementById('status');
  status.style.display = 'block';
  status.innerHTML += msg + '<br>';
}

async function submitForm() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const tab = document.getElementById('tab').value;
  
  if (!name || !email || !phone || !tab) {
    document.getElementById('status').style.display = 'block';
    document.getElementById('status').innerHTML = '<span class="error">❌ יש למלא את כל השדות</span>';
    return;
  }
  
  log('שליחת בקשה...');
  
  try {
    const response = await fetch(FIREBASE_URL + '/users.json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name, email, phone, tab,
        status: 'pending',
        registeredAt: new Date().toISOString()
      })
    });
    
    const result = await response.json();
    const userKey = result.name;
    log('✅ המשתמש נרשם: ' + userKey);
    
    const approvalUrl = 'https://shahafwaitzman.github.io/SUPER-TEAM-NETFLIX/approve.html?key=' + userKey;
    
    await emailjs.send('service_etqui87', 'template_6bo4ai9', {
      to_email: tab,
      tab_name: tab,
      user_name: name,
      user_email: email,
      approve_url: approvalUrl
    });
    
    log('✅ מייל נשלח לטאב');
    
    setTimeout(() => {
      window.location.href = 'confirmation.html?name=' + encodeURIComponent(name);
    }, 1500);
    
  } catch(e) {
    log('❌ שגיאה: ' + e.message);
    document.getElementById('status').innerHTML = '<span class="error">❌ ' + e.message + '</span>';
  }
}
</script>
</body>
</html>
