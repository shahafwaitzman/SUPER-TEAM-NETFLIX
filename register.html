<style>
:root {
  --nflx-bg: #141414;
  --nflx-red: #E50914;
  --nflx-red-dark: #B9090B;
  --nflx-text: #FFFFFF;
  --nflx-text-muted: #AAAAAA;
  --nflx-header-height: 70px;
  --stadium-img: url('hero.jpg');
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; min-height: 100vh; overflow-x: hidden; }
body {
  font-family: 'Heebo', 'Helvetica Neue', sans-serif;
  background: var(--nflx-bg);
  color: var(--nflx-text);
  line-height: 1.2;
  -webkit-font-smoothing: antialiased;
  position: relative;
}
a { color: inherit; text-decoration: none; }

body::before {
  content: ""; position: fixed; inset: 0; z-index: 0;
  background-image: var(--stadium-img);
  background-size: cover; background-position: center 30%;
  filter: contrast(1.08) saturate(1.12) brightness(0.6);
  transform: scale(1.02);
}
body::after {
  content: ""; position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(180deg,
    rgba(20,20,20,0.6) 0%,
    rgba(20,20,20,0.85) 50%,
    rgba(20,20,20,0.95) 100%);
}

/* NAVBAR */
.main-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nflx-header-height);
  display: flex; align-items: center;
  padding: 0 48px;
  z-index: 100;
  background: linear-gradient(rgba(0,0,0,0.7) 10%, rgba(0,0,0,0));
}
.logo {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin-left: 32px;
  text-transform: uppercase;
  user-select: none; line-height: 1;
}
.logo-super {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 11px;
  color: #fff; letter-spacing: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
.logo-line {
  width: 44px; height: 1.5px;
  background: linear-gradient(to right, transparent 0%, #fff 50%, transparent 100%);
  margin: 4px 0; border-radius: 2px;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
}
.logo-academy {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 18px;
  color: var(--nflx-red); letter-spacing: 1.5px;
  text-shadow: 0 2px 8px rgba(229,9,20,0.5), 0 1px 3px rgba(0,0,0,0.8);
}

/* Container */
.page-container {
  position: relative; z-index: 10;
  min-height: 100vh;
  padding: calc(var(--nflx-header-height) + 40px) 20px 40px;
  display: flex; align-items: center; justify-content: center;
}

.form-card {
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 48px 44px;
  max-width: 500px; width: 100%;
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.form-eyebrow {
  font-size: 11px;
  color: var(--nflx-red);
  letter-spacing: 4px;
  font-weight: 700;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.form-title {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.form-subtitle {
  font-size: 14px;
  color: var(--nflx-text-muted);
  margin-bottom: 32px;
}

.form-group { margin-bottom: 18px; }
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  color: #fff;
  font-size: 13px;
  letter-spacing: 0.3px;
}
input, select {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.2s;
}
input::placeholder { color: rgba(255,255,255,0.4); }
input:focus, select:focus {
  border-color: var(--nflx-red);
  background: rgba(255,255,255,0.08);
  outline: none;
  box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
}
select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='white' d='M6 8L0 0h12z'/></svg>");
  background-repeat: no-repeat;
  background-position: left 16px center;
  padding-left: 40px;
}
select option {
  background: #141414;
  color: #fff;
}

.submit-btn {
  width: 100%;
  padding: 14px;
  background: var(--nflx-red);
  border: none;
  border-radius: 4px;
  color: #fff;
  cursor: pointer;
  font-weight: 700;
  margin-top: 12px;
  font-family: inherit;
  font-size: 16px;
  letter-spacing: 0.5px;
  transition: background 0.2s, transform 0.2s;
}
.submit-btn:hover {
  background: var(--nflx-red-dark);
  transform: translateY(-1px);
}
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.status {
  margin-top: 16px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.05);
  border-right: 3px solid transparent;
  border-radius: 4px;
  font-size: 13px;
  display: none;
  line-height: 1.5;
}
.status.error { border-right-color: #ff5757; color: #ff8787; }
.status.success { border-right-color: #46d369; color: #7ae595; }
.status.loading { border-right-color: var(--nflx-red); color: #fff; }

.back-link {
  text-align: center;
  margin-top: 24px;
}
.back-link a {
  color: var(--nflx-text-muted);
  font-size: 13px;
  transition: color 0.2s;
}
.back-link a:hover { color: #fff; }

@media (max-width: 600px) {
  .main-header { padding: 0 16px; }
  .page-container { padding: calc(var(--nflx-header-height) + 20px) 16px 20px; }
  .form-card { padding: 32px 24px; }
  .form-title { font-size: 30px; }
}






.nav-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  margin-left: auto;
  background: linear-gradient(135deg, #E50914, #B9090B);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  box-shadow: 0 2px 8px rgba(229,9,20,0.3);
  white-space: nowrap;
  font-family: inherit;
  order: 999;
}
.nav-back-btn:hover {
  transform: translateX(-2px);
  box-shadow: 0 4px 12px rgba(229,9,20,0.5);
  opacity: 0.95;
}
.nav-back-btn svg {
  width: 14px; height: 14px;
  transition: transform 0.2s;
}
.nav-back-btn:hover svg {
  transform: translateX(-3px);
}
@media (max-width: 600px) {
  .nav-back-btn { padding: 6px 10px; font-size: 11px; }
  .nav-back-btn .back-label { display: none; }
}




/* ═══════════════════════════════════════════
   ELEGANT TEXT READABILITY (soft shadows like Netflix)
   ═══════════════════════════════════════════ */
.choice-title, .choice-description,
.hero-title, .hero-subtitle, .hero-title-academy,
.form-title, .billboard-title, .synopsis, .rowTitle,
.welcome-title, .welcome-subtitle,
.success-title, .success-eyebrow,
.logo-super, .logo-academy,
.card-title, .card-meta, .boxart-label {
  text-shadow:
    0 1px 2px rgba(0,0,0,0.6),
    0 2px 8px rgba(0,0,0,0.85),
    0 0 20px rgba(0,0,0,0.35) !important;
}

/* Deeper shadow for large hero-style text */
.hero-title, .billboard-title, .welcome-title, .form-title, .success-title {
  text-shadow:
    0 2px 4px rgba(0,0,0,0.7),
    0 4px 16px rgba(0,0,0,0.9),
    0 0 24px rgba(0,0,0,0.5) !important;
}

/* Red accent text keeps its colored glow */
.hero-title-academy, .logo-academy {
  text-shadow:
    0 2px 8px rgba(229,9,20,0.4),
    0 2px 4px rgba(0,0,0,0.9),
    0 4px 16px rgba(0,0,0,0.8) !important;
}

/* Don't apply shadow to text on solid/white buttons */
.color-primary, .color-primary span,
.submit-btn, .btn-primary,
.choice-cta, .nflx-btn.color-primary {
  text-shadow: none !important;
}

/* Subtle lift only for small labels on dark backgrounds */
.welcome-eyebrow, .form-eyebrow, .choice-badge,
.card-badge, .nav-back-btn span {
  text-shadow: 0 1px 2px rgba(0,0,0,0.6) !important;
}

/* ═══════════════════════════════════════════
   MOBILE TAP TARGETS (44x44 minimum for accessibility)
   ═══════════════════════════════════════════ */
@media (max-width: 600px) {
  .nav-back-btn {
    min-width: 44px;
    min-height: 44px;
    padding: 10px 12px !important;
    justify-content: center;
  }
  .logout-btn {
    min-height: 44px;
    padding: 10px 16px !important;
  }
  .back-link a, a[href="entry.html"].back-link {
    display: inline-block;
    min-height: 44px;
    padding: 12px 16px !important;
    line-height: 20px;
  }
  .back-link {
    padding: 4px 0;
  }
  .nav-icon-btn {
    min-width: 44px;
    min-height: 44px;
  }
  .logo {
    min-height: 44px;
    padding: 6px 8px;
  }
  .user-avatar, .profile-icon {
    min-width: 44px;
    min-height: 44px;
  }
  /* Form submit buttons full-width min 48px */
  .submit-btn, .btn-primary, .btn-secondary, .nflx-btn {
    min-height: 48px;
  }
}
</style>

<body>

<div class="main-header">
  <a href="entry.html" class="logo" aria-label="Academy">
    <span class="logo-super">SUPER TEAM</span>
    <span class="logo-line"></span>
    <span class="logo-academy">ACADEMY</span>
  </a>
  <a href="entry.html" class="nav-back-btn" aria-label="חזור למסך הכניסה"><svg viewBox="0 0 24 24" fill="none"><path fill="currentColor" d="M8.46 2.29a1 1 0 0 1 1.42 0l8.53 8.53a1.67 1.67 0 0 1 0 2.36l-8.53 8.53a1 1 0 1 1-1.42-1.42L16.59 12 8.46 3.71a1 1 0 0 1 0-1.42"/></svg><span class="back-label">חזור למסך הכניסה</span></a>
</div>

<main class="page-container">
  <div class="form-card">
    <div class="form-eyebrow">הצטרפות חדשה</div>
    <h1 class="form-title">בקשת אישור</h1>
    <p class="form-subtitle">מלא את הפרטים וקבל אישור מהטאב שלך</p>

    <div class="form-group">
      <label for="name">שם מלא *</label>
      <input type="text" id="name" placeholder="ישראל ישראלי">
    </div>

    <div class="form-group">
      <label for="email">אימייל *</label>
      <input type="email" id="email" placeholder="example@gmail.com">
    </div>

    <div class="form-group">
      <label for="phone">טלפון *</label>
      <input type="tel" id="phone" placeholder="050-1234567">
    </div>

    <div class="form-group">
      <label for="tab">בחר TAB *</label>
      <select id="tab">
        <option value="">-- בחר TAB --</option>
        <option value="shahafwai@gmail.com">שחף ויצמן</option>
        <option value="other@example.com">אחר</option>
      </select>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">שלח בקשה</button>

    <div class="status" id="status"></div>

    <div class="back-link">
      <a href="entry.html">← חזור</a>
    </div>
  </div>
</main>

<script>
const FIREBASE_URL = 'https://super-team-netflix-default-rtdb.europe-west1.firebasedatabase.app';
emailjs.init('nhwKyEa3uJ8JjmxXQ');

function setStatus(msg, type) {
  const status = document.getElementById('status');
  status.style.display = 'block';
  status.className = 'status ' + (type || 'loading');
  status.innerHTML = msg;
}

async function submitForm() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const tab = document.getElementById('tab').value;
  const btn = document.getElementById('submitBtn');

  if (!name || !email || !phone || !tab) {
    setStatus('❌ יש למלא את כל השדות', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'שולח...';
  setStatus('⏳ שולח בקשה...', 'loading');

  try {
    const response = await fetch(FIREBASE_URL + '/users.json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name, email, phone, tab,
        status: 'pending',
        registeredAt: new Date().toISOString()
      })
    });

    const result = await response.json();
    const userKey = result.name;

    const approvalUrl = 'https://shahafwaitzman.github.io/SUPER-TEAM-NETFLIX/approve.html?key=' + userKey;

    await emailjs.send('service_etqui87', 'template_6bo4ai9', {
      to_email: tab,
      tab_name: tab,
      user_name: name,
      user_email: email,
      approve_url: approvalUrl
    });

    setStatus('✅ הבקשה נשלחה! ממתין לאישור מהטאב...', 'success');

    setTimeout(() => {
      window.location.href = 'confirmation.html?name=' + encodeURIComponent(name);
    }, 1500);

  } catch(e) {
    setStatus('❌ שגיאה: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'שלח בקשה';
  }
}
</script>

</body>
