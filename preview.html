<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academy Preview - Super Team</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
}

body {
  font-family: 'Heebo', sans-serif;
  background: #000;
  color: #fff;
  background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.2) 100%), url('https://drive.google.com/uc?id=13JtFgrLuWvQGhmDA79FiTKpaUbY0xAvb') center/cover;
  background-attachment: fixed;
  min-height: 100vh;
}

.logo-section {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  text-align: right;
}

.logo-title {
  font-size: 36px;
  font-weight: 900;
  color: #e50914;
  margin-bottom: 0;
  line-height: 1;
  text-shadow: 0 4px 12px rgba(0,0,0,0.8);
  letter-spacing: -1px;
}

.logo-accent {
  width: 40px;
  height: 2px;
  background: #e50914;
  margin: 8px auto 0;
}

.logo-subtitle {
  font-size: 14px;
  color: #fff;
  margin-top: 4px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7);
  letter-spacing: -0.5px;
}

.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 60px;
  overflow: hidden;
}

.hero-content {
  position: relative;
  z-index: 10;
  text-align: center;
  animation: slideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.hero-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 40px;
}

.btn {
  padding: 14px 40px;
  font-size: 15px;
  font-weight: 700;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  letter-spacing: 0.5px;
  color: #ffffff;
  background: transparent;
  transition: all 0.3s ease;
}

.btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: #ffffff;
  transform: translateY(-2px);
}

.container {
  max-width: 1700px;
  margin: 0 auto;
  padding: 100px 60px;
  position: relative;
  z-index: 10;
  background: rgba(0,0,0,0.3);
}

.section-title {
  font-size: 48px;
  font-weight: 900;
  margin-bottom: 15px;
  letter-spacing: -1px;
}

.section-desc {
  font-size: 16px;
  color: #aaa;
  font-weight: 300;
  max-width: 600px;
  line-height: 1.6;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(60px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>
<body>

<div class="logo-section">
  <div class="logo-title">SUPER TEAM</div>
  <div class="logo-accent"></div>
  <div class="logo-subtitle">ACADEMY</div>
</div>

<section class="hero">
  <div class="hero-content">
    <div class="hero-buttons">
      <button class="btn">צפייה</button>
      <button class="btn">מידע נוסף</button>
    </div>
  </div>
</section>

<div class="container">
  <section>
    <h2 class="section-title">🎬 קורסים וסדרות</h2>
    <p class="section-desc">סדרה מלאה של תוכניות לימודיות - בקרוב יחובר עם הדרייב שלך</p>
  </section>
</div>

</body>
</html>
