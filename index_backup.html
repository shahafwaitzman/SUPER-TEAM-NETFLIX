<style>
:root {
  --bg: #141414;
  --bg-card: #181818;
  --bg-hover: #252525;
  --red: #e50914;
  --red-dark: #b20710;
  --red-glow: rgba(229,9,20,0.3);
  --gold: #f5c518;
  --green: #46d369;
  --white: #fff;
  --text: #e5e5e5;
  --text-dim: #999;
  --text-muted: #666;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Heebo', 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

/* ===== NAVBAR ===== */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center;
  padding: 0 4%;
  height: 68px;
  background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
  transition: background 0.3s;
}
nav.scrolled { background: rgba(20,20,20,0.97); box-shadow: 0 2px 20px rgba(0,0,0,0.5); }
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; margin-left: 40px;
}
.nav-brand-icon {
  width: 36px; height: 36px; border-radius: 6px;
  background: var(--red);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 14px; color: #fff;
  letter-spacing: -0.5px;
}
.nav-brand-text {
  font-size: 22px; font-weight: 900; color: var(--red);
  letter-spacing: 2px;
}
.nav-links {
  display: flex; gap: 20px; margin-right: 20px;
}
.nav-link {
  background: none; border: none; color: var(--text-dim);
  font-size: 14px; font-weight: 500; cursor: pointer;
  font-family: inherit; transition: color 0.2s;
  padding: 4px 0; position: relative;
}
.nav-link:hover { color: var(--white); }
.nav-link.active { color: var(--white); font-weight: 700; }
.nav-link.active::after {
  content: ''; position: absolute; bottom: -2px; right: 0; left: 0;
  height: 2px; background: var(--red); border-radius: 1px;
}
.nav-right {
  display: flex; align-items: center; gap: 16px;
  margin-right: auto;
}
.nav-search {
  position: relative;
}
.nav-search input {
  background: transparent; border: 1px solid var(--white);
  border-radius: 2px; padding: 6px 10px 6px 30px;
  color: var(--white); font-size: 14px; font-family: inherit;
  width: 0; opacity: 0;
  transition: all 0.4s; outline: none; direction: rtl;
}
.nav-search.open input { width: 220px; opacity: 1; padding: 6px 10px 6px 30px; background: rgba(0,0,0,0.8); }
.nav-search-icon {
  position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
  color: var(--white); font-size: 16px; cursor: pointer; z-index: 2;
}
.user-chip {
  display: none; align-items: center; gap: 8px;
  cursor: pointer; position: relative;
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 4px;
  background: linear-gradient(135deg, var(--red), #ff6b6b);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff;
}
.user-name { font-size: 13px; color: var(--text); font-weight: 500; }
.user-menu {
  display: none; position: absolute; top: 42px; left: 0;
  background: rgba(20,20,20,0.95); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px; padding: 8px 0; min-width: 140px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.user-chip:hover .user-menu { display: block; }
.user-menu-item {
  display: block; width: 100%; padding: 8px 16px; text-align: right;
  background: none; border: none; color: var(--text); font-size: 13px;
  font-family: inherit; cursor: pointer; transition: background 0.2s;
}
.user-menu-item:hover { background: rgba(255,255,255,0.1); }

/* ===== HERO BILLBOARD ===== */
.billboard {
  position: relative;
  height: 85vh;
  min-height: 500px;
  max-height: 800px;
  display: flex;
  align-items: flex-end;
  padding: 0 4% 80px;
  overflow: hidden;
}
.billboard-bg {
  position: absolute; inset: 0;
  background-image: url('hero.jpg');
  background-size: cover;
  background-position: center top;
  filter: brightness(0.55);
}
.billboard-bg-pattern { display: none; }
.billboard-bg-emoji { display: none; }
.billboard-vignette {
  position: absolute; inset: 0;
  background: linear-gradient(0deg, var(--bg) 0%, rgba(20,20,20,0.6) 25%, rgba(20,20,20,0.2) 55%, rgba(20,20,20,0.5) 100%);
}
.billboard-logo-hero {
  display: block; margin-bottom: 24px;
  width: min(380px, 80vw);
  filter: drop-shadow(0 4px 24px rgba(229,9,20,0.5));
}
.billboard-content {
  position: relative; z-index: 2;
  max-width: 600px;
}
.billboard-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(229,9,20,0.2); border: 1px solid rgba(229,9,20,0.3);
  border-radius: 2px; padding: 4px 12px;
  font-size: 12px; font-weight: 700; color: var(--red);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 16px;
}
.billboard h1 {
  font-size: 52px; font-weight: 900; line-height: 1.05;
  color: var(--white);
  margin-bottom: 16px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
.billboard h1 .highlight { color: var(--red); }
.billboard p {
  font-size: 17px; color: var(--text);
  line-height: 1.6; margin-bottom: 28px;
  text-shadow: 0 1px 8px rgba(0,0,0,0.5);
  max-width: 480px;
}
.billboard-actions {
  display: flex; gap: 12px; align-items: center;
  margin-bottom: 32px;
}
.btn-play {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 28px; border-radius: 4px;
  background: var(--white); color: #000;
  font-size: 16px; font-weight: 800; font-family: inherit;
  border: none; cursor: pointer; transition: all 0.2s;
  text-decoration: none;
}
.btn-play:hover { background: rgba(255,255,255,0.8); }
.btn-play svg { width: 24px; height: 24px; fill: #000; }
.btn-info {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 28px; border-radius: 4px;
  background: rgba(109,109,110,0.7); color: var(--white);
  font-size: 16px; font-weight: 600; font-family: inherit;
  border: none; cursor: pointer; transition: all 0.2s;
  text-decoration: none;
}
.btn-info:hover { background: rgba(109,109,110,0.5); }
.billboard-maturity {
  display: inline-flex; align-items: center;
  padding: 4px 10px 4px 16px;
  border-right: 3px solid rgba(255,255,255,0.4);
  font-size: 14px; color: var(--text);
  background: rgba(0,0,0,0.4);
}

/* ===== SECTIONS ===== */
.section {
  padding: 0 4%;
  margin-bottom: 48px;
  position: relative;
}
.section-header {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 12px;
}
.section-title {
  font-size: 22px; font-weight: 700; color: var(--white);
}
.section-explore {
  font-size: 13px; color: #54b9c5; font-weight: 500;
  cursor: pointer; transition: color 0.2s;
  display: flex; align-items: center; gap: 4px;
}
.section-explore:hover { color: #7dd4de; }
.section-count {
  font-size: 12px; color: var(--text-muted);
  background: rgba(255,255,255,0.06); border-radius: 2px;
  padding: 2px 8px;
}

/* ===== ROW ===== */
.row-wrapper {
  position: relative;
  margin: 0 -4px;
}
.row {
  display: flex; gap: 6px;
  overflow-x: auto; padding: 12px 4px 24px;
  scrollbar-width: none;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
}
.row::-webkit-scrollbar { display: none; }
.row-arrow {
  position: absolute; top: 0; bottom: 24px;
  width: 55px; z-index: 5;
  background: rgba(20,20,20,0.7);
  border: none; color: var(--white); font-size: 32px;
  cursor: pointer; display: none; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.row-arrow:hover { background: rgba(20,20,20,0.95); }
.row-arrow.left { left: -4px; }
.row-arrow.right { right: -4px; }
.row-wrapper:hover .row-arrow { display: flex; }

/* ===== CARD ===== */
.card {
  flex-shrink: 0;
  width: 240px;
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
  scroll-snap-align: start;
  text-decoration: none;
  display: block;
  position: relative;
  background: var(--bg-card);
}
.card:hover {
  transform: scale(1.35);
  z-index: 10;
  box-shadow: 0 12px 40px rgba(0,0,0,0.8);
  border-radius: 6px;
}
.card:hover .card-expand {
  opacity: 1;
  max-height: 200px;
  padding: 12px 14px;
}
.card:hover .card-play-btn {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.card-thumb {
  position: relative;
  height: 140px;
  overflow: hidden;
}
.card-thumb-bg {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.card-thumb[data-cat="new"] { background: linear-gradient(135deg, #1a2a1a, #0f3a1a); }
.card-thumb[data-cat="supervisor"] { background: linear-gradient(135deg, #2a1a0a, #3a2a0a); }
.card-thumb[data-cat="wt"] { background: linear-gradient(135deg, #1a0a2a, #2a0a3a); }
.card-thumb[data-cat="general"] { background: linear-gradient(135deg, #0a1a2a, #0a2a3a); }
.card-thumb[data-cat="docs"] { background: linear-gradient(135deg, #2a1a0a, #3a1a0a); }
.card-emoji {
  font-size: 56px;
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  transition: transform 0.3s;
}
.card:hover .card-emoji { transform: translate(-50%, -50%) scale(1.1); }
.card-play-btn {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.7);
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.95);
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: all 0.3s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  z-index: 3;
}
.card-play-btn svg { width: 18px; height: 18px; fill: #000; margin-right: -2px; }
.card-progress {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px; background: rgba(255,255,255,0.15);
}
.card-progress-fill {
  height: 100%;
  background: var(--red);
  box-shadow: 0 0 4px rgba(229,9,20,0.5);
  transition: width 0.5s;
}
.card-duration {
  position: absolute; bottom: 8px; left: 8px;
  background: rgba(0,0,0,0.8);
  border-radius: 2px; padding: 1px 6px;
  font-size: 11px; font-weight: 600; color: #fff;
}
.card-badge {
  position: absolute; top: 6px; right: 6px;
  border-radius: 2px; padding: 1px 6px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-new { background: var(--green); color: #000; }
.badge-supervisor { background: var(--gold); color: #000; }
.badge-wt { background: #7b2ff7; color: #fff; }
.badge-general { background: #0ea5e9; color: #fff; }
.badge-docs { background: #f97316; color: #fff; }

/* ===== CARD EXPAND (Netflix hover panel) ===== */
.card-expand {
  background: var(--bg-card);
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  padding: 0 14px;
  transition: all 0.3s ease;
}
.card-expand-title {
  font-size: 14px; font-weight: 700; color: var(--white);
  margin-bottom: 4px;
}
.card-expand-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.card-expand-match {
  font-size: 12px; font-weight: 700; color: var(--green);
}
.card-expand-duration {
  font-size: 12px; color: var(--text-dim);
}
.card-expand-badge {
  font-size: 10px; padding: 1px 5px; border: 1px solid rgba(255,255,255,0.3);
  border-radius: 2px; color: var(--text-dim);
}
.card-expand-desc {
  font-size: 12px; color: var(--text-dim); line-height: 1.4;
  margin-bottom: 8px;
}
.card-expand-actions {
  display: flex; gap: 8px; align-items: center;
}
.card-expand-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.5);
  background: rgba(42,42,42,0.8);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--white);
  cursor: pointer; transition: all 0.2s;
}
.card-expand-btn:hover { border-color: var(--white); background: rgba(60,60,60,0.8); }
.card-expand-btn.play-sm {
  background: var(--white); border-color: var(--white);
  color: #000;
}
.card-expand-btn.play-sm:hover { background: rgba(255,255,255,0.8); }

/* ===== CONTINUE WATCHING BAR ===== */
.continue-section .card-progress-fill { background: var(--red); }

/* ===== CARD TITLE ALWAYS VISIBLE ===== */
.card-info-bar {
  padding: 8px 10px;
  background: var(--bg-card);
}
.card-info-title {
  font-size: 13px; font-weight: 600; color: var(--white);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-info-status {
  font-size: 11px; color: var(--text-muted); margin-top: 2px;
  display: flex; align-items: center; gap: 6px;
}
.card-info-status .done { color: var(--green); font-weight: 700; }
.card-info-status .notstart { color: var(--text-muted); }

/* ===== SPONSORS ===== */
.sponsors {
  display: flex; align-items: center; justify-content: center;
  gap: 40px; padding: 20px 4%;
  background: rgba(255,255,255,0.03);
  border-top: 1px solid rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 32px;
}
.sponsor {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px;
  border-radius: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.2s;
}
.sponsor:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
.sponsor-icon {
  width: 40px; height: 40px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 14px; color: #fff;
}
.sponsor-icon.awt { background: linear-gradient(135deg, #f59e0b, #d97706); }
.sponsor-icon.tab { background: linear-gradient(135deg, #3b82f6, #2563eb); }
.sponsor-info { text-align: right; }
.sponsor-name { font-size: 14px; font-weight: 700; color: var(--white); }
.sponsor-label { font-size: 11px; color: var(--text-muted); }

/* ===== USER PROGRESS OVERVIEW ===== */
.my-progress {
  padding: 20px 4%;
  margin-bottom: 24px;
}
.my-progress-title {
  font-size: 18px; font-weight: 700; color: var(--white);
  margin-bottom: 16px;
}
.my-progress-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}
.my-progress-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px; padding: 14px 16px;
}
.my-progress-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.my-progress-name { font-size: 13px; font-weight: 600; color: var(--text); }
.my-progress-pct { font-size: 14px; font-weight: 800; }
.my-progress-bar {
  height: 4px; background: rgba(255,255,255,0.1);
  border-radius: 2px; overflow: hidden;
}
.my-progress-fill {
  height: 100%; border-radius: 2px;
  transition: width 0.8s ease;
}
.my-progress-count {
  font-size: 11px; color: var(--text-muted); margin-top: 6px;
}
.my-progress-overall {
  background: rgba(229,9,20,0.1);
  border: 1px solid rgba(229,9,20,0.2);
  border-radius: 6px; padding: 16px;
  text-align: center;
}
.my-progress-overall-pct {
  font-size: 36px; font-weight: 900; color: var(--red);
}
.my-progress-overall-label {
  font-size: 13px; color: var(--text-dim); margin-top: 4px;
}

/* ===== LOGIN ===== */
.login-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, rgba(0,0,0,0.97) 0%, rgba(20,0,0,0.97) 100%);
  display: flex; align-items: center; justify-content: center;
}
.login-bg-grid {
  position: absolute; inset: 0; overflow: hidden;
  display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(4, 1fr);
  gap: 8px; padding: 60px 40px; opacity: 0.06;
}
.login-bg-cell {
  background: rgba(255,255,255,0.3); border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
}
.login-box {
  position: relative; z-index: 2;
  background: rgba(0,0,0,0.8);
  border-radius: 8px;
  padding: 56px 48px;
  width: 400px;
  text-align: center;
}
.login-logo {
  width: 70px; height: 70px; border-radius: 12px;
  background: var(--red);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 28px; color: #fff;
  margin: 0 auto 24px;
  box-shadow: 0 4px 30px var(--red-glow);
}
.login-title { font-size: 30px; font-weight: 900; color: var(--white); margin-bottom: 4px; }
.login-sub { font-size: 15px; color: var(--text-dim); margin-bottom: 36px; }
.login-field { margin-bottom: 20px; text-align: right; }
.login-field label {
  font-size: 13px; font-weight: 600; color: var(--text-dim);
  display: block; margin-bottom: 6px;
}
.login-field input {
  width: 100%;
  background: #333;
  border: none; border-bottom: 2px solid transparent;
  border-radius: 4px;
  padding: 16px 14px;
  color: var(--white);
  font-size: 16px; font-family: inherit;
  outline: none; direction: rtl;
  transition: all 0.2s;
}
.login-field input:focus {
  border-bottom-color: var(--red);
  background: #404040;
}
.login-field input::placeholder { color: var(--text-muted); }
.login-btn {
  width: 100%; padding: 15px;
  background: var(--red);
  color: #fff; font-size: 17px; font-weight: 800;
  border: none; border-radius: 4px; cursor: pointer;
  margin-top: 12px; font-family: inherit;
  transition: all 0.2s;
  box-shadow: 0 4px 20px var(--red-glow);
}
.login-btn:hover { background: var(--red-dark); }
.login-privacy { font-size: 12px; color: var(--text-muted); margin-top: 20px; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-card); border: 1px solid var(--red);
  border-radius: 6px; padding: 12px 24px;
  font-size: 14px; font-weight: 600; color: var(--red);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  transition: transform 0.3s; z-index: 999;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== FOOTER ===== */
.footer {
  padding: 60px 4% 30px;
  color: var(--text-muted);
  font-size: 12px;
}
.footer-links { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
.footer-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; }
.footer-links a:hover { text-decoration: underline; }
.footer-copy { margin-top: 16px; opacity: 0.6; }

.hidden { display: none !important; }

/* ===== TABLET ===== */
@media (max-width: 900px) {
  nav { padding: 0 12px; height: 56px; }

      <select id="loginTab" style="width:100%;background:#333;border:none;border-radius:4px;padding:14px;color:#fff;font-size:16px;font-family:inherit;outline:none;appearance:none;cursor:pointer">

// ============ PER-USER PROGRESS ============
function getUserKey() {
  const u = JSON.parse(localStorage.getItem('st_user') || 'null');
  if (!u) return null;
  return 'st_progress_' + u.phone;
}
function loadUserProgress() {
  const key = getUserKey();
  if (!key) return {};
  return JSON.parse(localStorage.getItem(key) || '{}');
}
function saveUserProgress(prog) {
  const key = getUserKey();
  if (key) localStorage.setItem(key, JSON.stringify(prog));
}
function markWatched(videoId) {
  const prog = loadUserProgress();
  prog[videoId] = 100;
  saveUserProgress(prog);
  applyProgress();
  renderAll();
  syncProgressToFirebase();
  showToast('\u2713 \u05E1\u05D5\u05DE\u05DF \u05DB\u05E0\u05E6\u05E4\u05D4!');
}
function applyProgress() {
  const prog = loadUserProgress();
  VIDEOS.forEach(v => { v.progress = prog[v.id] || 0; });
}

// ============ LOGIN ============
async function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const phone = document.getElementById('loginPhone').value.trim();
  const tab = document.getElementById('loginTab').value;
  if (!name || !email || !phone || !tab) { showToast('נא למלא את כל השדות'); return; }

  document.querySelector('.login-btn').textContent = 'בודק...';
  const status = await registerUser(name, email, phone, tab);

  if (status === 'pending') {
    showPendingScreen(name);
    localStorage.setItem('st_user', JSON.stringify({ name, email, phone, tab }));
    return;
  }
  if (status === 'denied') {
    showToast('הגישה נדחתה. פנה למנהל הצוות.');
    document.querySelector('.login-btn').textContent = 'כניסה לאקדמיה';
    return;
  }
  if (status === 'not_allowed') {
    showToast('האימייל לא מופיע ברשימה המאושרת.');
    document.querySelector('.login-btn').textContent = 'כניסה לאקדמיה';
    return;
  }

  // approved
  localStorage.setItem('st_user', JSON.stringify({ name, email, phone, tab }));
  document.getElementById('loginOverlay').classList.add('hidden');
  hidePendingScreen();
  showUser({ name, phone });
  applyProgress();
  renderAll();
  showToast('\u05D1\u05E8\u05D5\u05DA \u05D4\u05D1\u05D0, ' + name + '!');
}

function showPendingScreen(name) {
  let el = document.getElementById('pendingScreen');
  if (!el) {
    el = document.createElement('div');
    el.id = 'pendingScreen';
    el.style.cssText = 'position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.97);display:flex;align-items:center;justify-content:center;text-align:center;font-family:Heebo,sans-serif;';
    document.body.appendChild(el);
  }
  el.innerHTML = '<div style="max-width:400px;padding:40px">' +
    '<div style="font-size:60px;margin-bottom:20px">\u23F3</div>' +
    '<h2 style="color:#fff;font-size:24px;margin-bottom:10px">\u05E9\u05DC\u05D5\u05DD ' + name + '!</h2>' +
    '<p style="color:#999;font-size:16px;line-height:1.6;margin-bottom:24px">\u05D4\u05D1\u05E7\u05E9\u05D4 \u05E9\u05DC\u05DA \u05E0\u05E9\u05DC\u05D7\u05D4 \u05DC\u05DE\u05E0\u05D4\u05DC \u05D4\u05E6\u05D5\u05D5\u05EA.<br>\u05EA\u05E7\u05D1\u05DC \u05D0\u05D9\u05E9\u05D5\u05E8 \u05D1\u05E7\u05E8\u05D5\u05D1.</p>' +
    '<button onclick="recheckStatus()" style="padding:12px 28px;background:#e50914;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">\u05D1\u05D3\u05D5\u05E7 \u05E9\u05D5\u05D1</button>' +
    '<p style="color:#666;font-size:12px;margin-top:16px">\u05D4\u05D3\u05E3 \u05D1\u05D5\u05D3\u05E7 \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA \u05DB\u05DC 15 \u05E9\u05E0\u05D9\u05D5\u05EA</p>' +
  '</div>';
  el.style.display = 'flex';
  startStatusPolling();
}

function hidePendingScreen() {
  const el = document.getElementById('pendingScreen');
  if (el) el.style.display = 'none';
  stopStatusPolling();
}

let pollInterval = null;
function startStatusPolling() {
  stopStatusPolling();
  pollInterval = setInterval(recheckStatus, 15000);
}
function stopStatusPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

async function recheckStatus() {
  const u = JSON.parse(localStorage.getItem('st_user') || 'null');
  if (!u) return;
  const status = await checkUserStatus(u.email || u.phone);
  if (status === 'approved') {
    document.getElementById('loginOverlay').classList.add('hidden');
    hidePendingScreen();
    showUser(u);
    applyProgress();
    renderAll();
    showToast('אושרת! ברוך הבא, ' + u.name + '!');
  } else if (status === 'denied') {
    hidePendingScreen();
    localStorage.removeItem('st_user');
    showToast('\u05D4\u05D2\u05D9\u05E9\u05D4 \u05E0\u05D3\u05D7\u05EA\u05D4.');
    location.reload();
  }
}

function doLogout() { localStorage.removeItem('st_user'); stopStatusPolling(); location.reload(); }
function showUser(u) {
  const chip = document.getElementById('userChip');
  chip.style.display = 'flex';
  document.getElementById('userAvatar').textContent = u.name.charAt(0);
  document.getElementById('userName').textContent = u.name;
}
async function checkLogin() {
  const u = JSON.parse(localStorage.getItem('st_user') || 'null');
  if (!u) return;
  const status = await checkUserStatus(u.email || u.phone);
  if (status === 'approved') {
    document.getElementById('loginOverlay').classList.add('hidden');
    showUser(u);
    applyProgress();
  } else if (status === 'pending') {
    showPendingScreen(u.name);
  } else if (status === 'denied') {
    localStorage.removeItem('st_user');
  }
}

async function fetchDriveFiles(folderId, category) {
  try {
    const response = await fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents&fields=id,name,mimeType,webContentLink&key=${DRIVE_API_KEY}`);
    const data = await response.json();
    if (data.files) {
      return data.files.map((f, idx) => ({
        id: parseInt(folderId.slice(-4) + idx),
        category,
        title: f.name.replace(/\.[^/.]+$/, ''),
        desc: `📁 ${category} - ${f.name}`,
        duration: '✓',
        progress: 0,
        fav: false,
        driveId: f.id,
        emoji: '📄'
      }));
    }
  } catch (e) {
    console.log('Drive API note: files loaded from cache');
  }
  return [];
}

async function loadDriveContent() {
  let driveVideos = [];
  for (const [cat, folderId] of Object.entries(FOLDER_IDS)) {
    const files = await fetchDriveFiles(folderId, cat);
    driveVideos = driveVideos.concat(files);

  // Category sections

// ============ FIREBASE CONFIG ============
const FIREBASE_URL = 'https://super-team-netflix-default-rtdb.europe-west1.firebasedatabase.app';

async function registerUser(name, email, phone, tab) {
  try {
    // Check if user already exists
    const checkRes = await fetch(FIREBASE_URL + '/users.json');
    const allUsers = await checkRes.json() || {};
    const existing = Object.values(allUsers).find(u => u.email === email);
    if (existing) {
      return existing.status || 'pending';
    }
    // Register new user as pending
    const regRes = await fetch(FIREBASE_URL + '/users.json', {
      method: 'POST',
      body: JSON.stringify({ name, email, phone, tab, status: 'pending', registeredAt: new Date().toISOString() })
    });
    const regData = await regRes.json();
    const userKey = regData.name;
    // Send email notification to TAB member
    sendTabNotification(tab, name, email, userKey);
    return 'pending';
  } catch(e) { console.error(e); return 'not_allowed'; }
}

async function sendTabNotification(tabName, userName, userEmail, userKey) {
  try {
    const res = await fetch(FIREBASE_URL + '/tabMembers.json');
    const members = await res.json() || [];
    const list = Array.isArray(members) ? members : Object.values(members);
    const tabMember = list.find(m => m.name === tabName);
    if (!tabMember) return;
    const approveUrl = 'https://superteamhlf.team/approve.html?key=' + userKey;
    emailjs.send('service_etqui87', 'template_6bo4ai9', {
      to_email: tabMember.email,
      tab_name: tabName,
      user_name: userName,
      user_email: userEmail,
      approve_url: approveUrl
    }).catch(() => {});
  } catch(e) { console.error(e); }
}

async function loadTabMembers() {
  try {
    const res = await fetch(FIREBASE_URL + '/tabMembers.json');
    const members = await res.json() || [];
    const list = Array.isArray(members) ? members : Object.values(members);
    const sel = document.getElementById('loginTab');
    list.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.name;
      opt.textContent = m.name;
      sel.appendChild(opt);
    });
  } catch(e) { console.error(e); }
}

async function checkUserStatus(email) {
  try {
    const res = await fetch(FIREBASE_URL + '/users.json');
    const allUsers = await res.json() || {};
    const user = Object.values(allUsers).find(u => u.email === email);
    if (user) return user.status || 'pending';
    return 'not_found';
  } catch(e) { return 'approved'; }
}

function syncProgressToFirebase() {
  const u = JSON.parse(localStorage.getItem('st_user') || 'null');
  if (!u) return;
  const prog = loadUserProgress();
  const key = (u.email || u.phone).replace(/[.#$\[\]]/g, '_');
  fetch(FIREBASE_URL + '/progress/' + key + '.json', {
    method: 'PUT',
    body: JSON.stringify(prog)
  }).catch(() => {});
}
