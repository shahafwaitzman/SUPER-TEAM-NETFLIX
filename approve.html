<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אישור משתמש - Super Team Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
  color: #e5e5e5;
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.box {
  background: rgba(26,26,46,0.6);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  padding: 50px 40px;
  text-align: center;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 8px 16px rgba(0,0,0,0.15);
}
.icon {
  font-size: 64px;
  margin-bottom: 20px;
}
h1 {
  font-size: 24px;
  color: #fff;
  margin-bottom: 12px;
  font-weight: 900;
}
p {
  font-size: 15px;
  color: rgba(255,255,255,0.7);
  line-height: 1.6;
  margin-bottom: 12px;
}
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 28px;
  background: transparent;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  text-decoration: none;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s ease;
}
.btn:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.5);
  box-shadow: 0 8px 16px rgba(0,0,0,0.15);
}
.btn-whatsapp {
  display: inline-block;
  margin-top: 16px;
  padding: 12px 28px;
  background: rgba(37,211,102,0.2);
  color: #25d366;
  border: 1px solid #25d366;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  text-decoration: none;
  font-family: inherit;
  cursor: pointer;
  margin-left: 8px;
  transition: all 0.3s ease;
}
.btn-whatsapp:hover {
  background: rgba(37,211,102,0.3);
  border-color: #25d366;
  box-shadow: 0 8px 16px rgba(37,211,102,0.15);
}
.debug {
  font-size: 12px;
  color: #666;
  margin-top: 24px;
  padding: 12px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
}

/* ═════ Shared Super Team Nav (unified across projects) ═════ */
.st-nav-root {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000; height: 68px;
  display: flex; align-items: center;
  padding: 0 4%;
  gap: 12px;
  background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 70%, transparent 100%);
  font-family: 'Heebo', 'Segoe UI', Arial, sans-serif;
}
.st-logo {
  display: inline-flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-decoration: none; user-select: none;
  line-height: 1;
  flex-shrink: 0;
}
.st-logo .logo-super {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 11px;
  color: #fff; letter-spacing: 2px;
}
.st-logo .logo-line {
  width: 44px; height: 1.5px;
  background: linear-gradient(to right, transparent 0%, #fff 50%, transparent 100%);
  margin: 4px 0; border-radius: 2px;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
}
.st-logo .logo-academy {
  font-family: 'Bebas Neue', 'Heebo', sans-serif;
  font-weight: 900; font-size: 18px;
  color: #E50914; letter-spacing: 1.5px;
  text-shadow: 0 2px 8px rgba(229,9,20,0.5);
}

/* Uniform action buttons */
.st-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border-radius: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.9);
  font-family: inherit; font-size: 12.5px; font-weight: 700;
  cursor: pointer; text-decoration: none;
  transition: all 0.2s;
  white-space: nowrap;
}
.st-btn:hover {
  background: rgba(229,9,20,0.18);
  border-color: rgba(229,9,20,0.5);
  color: #fff;
}
.st-btn.primary {
  background: linear-gradient(135deg, #E50914, #B9090B);
  border-color: transparent;
  color: #fff;
}
.st-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(229,9,20,0.4); }
.st-btn svg { width: 14px; height: 14px; fill: currentColor; }

.st-nav-spacer { flex: 1; }

.st-hamburger {
  width: 40px; height: 40px;
  display: none; align-items: center; justify-content: center;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  color: #fff; cursor: pointer;
  font-family: inherit;
  padding: 0;
}
.st-hamburger svg { width: 20px; height: 20px; }

.st-mobile-menu {
  display: none;
  position: fixed; top: 68px;
  inset-inline-start: 0; inset-inline-end: 0;
  background: rgba(0,0,0,0.96);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  z-index: 999;
  padding: 16px;
  flex-direction: column; gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  animation: stSlideDown 0.25s ease;
}
@keyframes stSlideDown {
  from { transform: translateY(-10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.st-mobile-menu.open { display: flex; }
.st-mobile-menu a { padding: 14px; }

@media (max-width: 768px) {
  .st-nav-root { padding: 0 4%; height: 60px; }
  .st-mobile-menu { top: 60px; }
  .st-desktop-only { display: none !important; }
  .st-hamburger { display: inline-flex; }
  .st-logo .logo-academy { font-size: 16px; }
  .st-logo .logo-super { font-size: 10px; }
}

/* Offset body content so fixed nav doesn't overlap */
body.st-nav-installed { padding-top: 0; }
/* ═════ /Shared Super Team Nav ═════ */
</style>
</head>
<body>
<div class="st-nav-root">
  <a href="entry.html" class="logo st-logo" aria-label="Super Team ACADEMY">
    <span class="logo-super">SUPER TEAM</span>
    <span class="logo-line"></span>
    <span class="logo-academy">ACADEMY</span>
  </a>
  <div class="st-nav-spacer"></div>
  <a href="dashboard.html" class="st-btn st-desktop-only" aria-label="דף הבית">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>דף הבית</span>
  </a>
</div>
<div style="height:68px"></div>

<div class="box" id="box">
  <div class="icon">⏳</div>
  <h1>מעבד...</h1>
  <p>נא המתן</p>
  <div class="debug" id="debug"></div>
</div>

<script>
const FIREBASE_URL = 'https://super-team-netflix-default-rtdb.europe-west1.firebasedatabase.app';

function log(msg) {
  console.log('[approve] ' + msg);
  document.getElementById('debug').innerHTML += msg + '<br>';
}

async function approve() {
  try {
    log('התחלה...');
    const params = new URLSearchParams(window.location.search);
    const key = params.get('key');
    const box = document.getElementById('box');

    if (!key) {
      log('❌ אין KEY בURL');
      box.innerHTML = '<div class="icon">❌</div><h1>לינק לא תקין</h1><p>הלינק שקיבלת אינו תקין.</p>';
      return;
    }

    log('KEY: ' + key);

    log('בדיקת משתמש בFirebase...');
    const userRes = await fetch(FIREBASE_URL + '/users/' + key + '.json');
    log('Firebase response: ' + userRes.status);
    const user = await userRes.json();
    log('משתמש: ' + (user ? user.name : 'לא נמצא'));

    if (!user) {
      log('❌ משתמש לא נמצא');
      box.innerHTML = '<div class="icon">❌</div><h1>משתמש לא נמצא</h1>';
      return;
    }

    if (user.status === 'approved') {
      log('ℹ️ משתמש כבר מאושר');
      box.innerHTML = '<div class="icon">✅</div><h1 style="color:#46d369">' + user.name + ' כבר מאושר!</h1><p>המשתמש כבר קיבל גישה לאקדמיה.</p>';
      const backUrl = window.location.origin.includes('github.io')
        ? window.location.origin + '/SUPER-TEAM-NETFLIX/'
        : window.location.origin + '/';
      setTimeout(() => { window.location.href = backUrl; }, 2000);
      return;
    }

    log('שליחת PATCH לFirebase...');
    const patchRes = await fetch(FIREBASE_URL + '/users/' + key + '.json', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'approved' })
    });

    log('PATCH response: ' + patchRes.status);
    if (!patchRes.ok) {
      throw new Error('Failed to update status: ' + patchRes.status);
    }

    const patchData = await patchRes.json();
    log('✅ STATUS עודכן לapproved');

    const backUrl = window.location.origin.includes('github.io')
      ? window.location.origin + '/SUPER-TEAM-NETFLIX/'
      : window.location.origin + '/';
    log('Return URL: ' + backUrl);

    const accessUrl = backUrl + 'access.html';
    const whatsappMsg = encodeURIComponent(
      'היי ' + user.name + '! 🎉\n' +
      'ברוכ/ה הבא/ה ל-Super Team Academy ✨\n' +
      '\n' +
      '🔑 לחצ/י לכניסה ישירה:\n' +
      accessUrl + '\n' +
      '\n' +
      '📝 הפרטים שלך:\n' +
      '• שם: ' + user.name + '\n' +
      '• אימייל: ' + user.email + '\n' +
      '• TAB: ' + user.tab + '\n' +
      '\n' +
      '💎 מה מחכה לך בפנים:\n' +
      '🎬 קורסים, סדרות וזומים\n' +
      '💼 פלואו עסקי לפגישות\n' +
      '\n' +
      'מחכים לך בפנים! 🚀'
    );
    
    let phoneDigits = (user.phone || '').replace(/\D/g, '');
    if (phoneDigits.startsWith('0')) {
      phoneDigits = '972' + phoneDigits.slice(1);
    }
    const whatsappLink = 'https://wa.me/' + phoneDigits + '?text=' + whatsappMsg;

    box.innerHTML =
      '<div class="icon">✅</div>' +
      '<h1 style="color:#46d369">' + user.name + ' אושר!</h1>' +
      '<p>' + user.name + ' יכול כעת להיכנס לאקדמיה.</p>' +
      '<div style="margin-top:20px;">' +
        '<a href="' + whatsappLink + '" class="btn-whatsapp" target="_blank">💬 שלח בוואטאפ</a>' +
      '</div>' +
      '<p style="color:#999; font-size:12px; margin-top:24px;">מעבור לעמוד הבית בעוד 3 שניות...</p>';

    log('🔄 Redirecting to: ' + backUrl);
    setTimeout(() => {
      window.location.href = backUrl;
    }, 3000);

  } catch(e) {
    log('❌ שגיאה: ' + e.message);
    const box = document.getElementById('box');
    box.innerHTML = '<div class="icon">❌</div><h1 style="color:#e50914">שגיאה</h1><p>' + e.message + '</p><p>נסה שוב מאוחר יותר.</p>';
  }
}

approve();
</script>
</body>
</html>
