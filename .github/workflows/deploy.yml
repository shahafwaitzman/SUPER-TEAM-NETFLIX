name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          zip -r deployment.zip . \
            -x ".git/*" ".github/*" "node_modules/*" ".DS_Store" "*.md"

      - name: Deploy to Cloudflare Pages
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/super-team-academy/deployments" \
            -H "X-Auth-Email: shahafwai@gmail.com" \
            -H "X-Auth-Key: ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -F "manifest=@deployment.zip;type=application/zip" \
            | jq .
