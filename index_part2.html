// ============ PER-USER PROGRESS ============
function getUserKey() {
  const u = JSON.parse(localStorage.getItem('st_user') || 'null');
  if (!u) return null;
  return 'st_progress_' + u.phone;
}
function loadUserProgress() {
  const key = getUserKey();
  if (!key) return {};
  return JSON.parse(localStorage.getItem(key) || '{}');
}
function saveUserProgress(prog) {
  const key = getUserKey();
  if (key) localStorage.setItem(key, JSON.stringify(prog));
}
function markWatched(videoId) {
  const prog = loadUserProgress();
  prog[videoId] = 100;
  saveUserProgress(prog);
  applyProgress();
  renderAll();
  syncProgressToFirebase();
  showToast('\u2713 \u05E1\u05D5\u05DE\u05DF \u05DB\u05E0\u05E6\u05E4\u05D4!');
}
function applyProgress() {
  const prog = loadUserProgress();
  VIDEOS.forEach(v => { v.progress = prog[v.id] || 0; });
}

// ============ LOGIN ============
async function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const phone = document.getElementById('loginPhone').value.trim();
  const tab = document.getElementById('loginTab').value;
  if (!name || !email || !phone || !tab) { showToast('נא למלא את כל השדות'); return; }

  document.querySelector('.login-btn').textContent = 'בודק...';
  const status = await registerUser(name, email, phone, tab);

  if (status === 'pending') {
    showPendingScreen(name);
    localStorage.setItem('st_user', JSON.stringify({ name, email, phone, tab }));
    return;
  }
  if (status === 'denied') {
    showToast('הגישה נדחתה. פנה למנהל הצוות.');
    document.querySelector('.login-btn').textContent = 'כניסה לאקדמיה';
    return;
  }
  if (status === 'not_allowed') {
    showToast('האימייל לא מופיע ברשימה המאושרת.');
    document.querySelector('.login-btn').textContent = 'כניסה לאקדמיה';
    return;
  }

  // approved
  localStorage.setItem('st_user', JSON.stringify({ name, email, phone, tab }));
  document.getElementById('loginOverlay').classList.add('hidden');
  hidePendingScreen();
  showUser({ name, phone });
  applyProgress();
  renderAll();
  showToast('\u05D1\u05E8\u05D5\u05DA \u05D4\u05D1\u05D0, ' + name + '!');
}

function showPendingScreen(name) {
  let el = document.getElementById('pendingScreen');
  if (!el) {
    el = document.createElement('div');
    el.id = 'pendingScreen';
    el.style.cssText = 'position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.97);display:flex;align-items:center;justify-content:center;text-align:center;font-family:Heebo,sans-serif;';
    document.body.appendChild(el);
  }
  el.innerHTML = '<div style="max-width:400px;padding:40px">' +
    '<div style="font-size:60px;margin-bottom:20px">\u23F3</div>' +
    '<h2 style="color:#fff;font-size:24px;margin-bottom:10px">\u05E9\u05DC\u05D5\u05DD ' + name + '!</h2>' +
    '<p style="color:#999;font-size:16px;line-height:1.6;margin-bottom:24px">\u05D4\u05D1\u05E7\u05E9\u05D4 \u05E9\u05DC\u05DA \u05E0\u05E9\u05DC\u05D7\u05D4 \u05DC\u05DE\u05E0\u05D4\u05DC \u05D4\u05E6\u05D5\u05D5\u05EA.<br>\u05EA\u05E7\u05D1\u05DC \u05D0\u05D9\u05E9\u05D5\u05E8 \u05D1\u05E7\u05E8\u05D5\u05D1.</p>' +
    '<button onclick="recheckStatus()" style="padding:12px 28px;background:#e50914;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">\u05D1\u05D3\u05D5\u05E7 \u05E9\u05D5\u05D1</button>' +
    '<p style="color:#666;font-size:12px;margin-top:16px">\u05D4\u05D3\u05E3 \u05D1\u05D5\u05D3\u05E7 \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA \u05DB\u05DC 15 \u05E9\u05E0\u05D9\u05D5\u05EA</p>' +
  '</div>';
  el.style.display = 'flex';
  startStatusPolling();
}

function hidePendingScreen() {
  const el = document.getElementById('pendingScreen');
  if (el) el.style.display = 'none';
  stopStatusPolling();
}

let pollInterval = null;
function startStatusPolling() {
  stopStatusPolling();
  pollInterval = setInterval(recheckStatus, 15000);
}
function stopStatusPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

async function recheckStatus() {
  const u = JSON.parse(localStorage.getItem('st_user') || 'null');
  if (!u) return;
  const status = await checkUserStatus(u.email || u.phone);
  if (status === 'approved') {
    document.getElementById('loginOverlay').classList.add('hidden');
    hidePendingScreen();
    showUser(u);
    applyProgress();
    renderAll();
    showToast('אושרת! ברוך הבא, ' + u.name + '!');
  } else if (status === 'denied') {
    hidePendingScreen();
    localStorage.removeItem('st_user');
    showToast('\u05D4\u05D2\u05D9\u05E9\u05D4 \u05E0\u05D3\u05D7\u05EA\u05D4.');
    location.reload();
  }
}

function doLogout() { localStorage.removeItem('st_user'); stopStatusPolling(); location.reload(); }
function showUser(u) {
  const chip = document.getElementById('userChip');
  chip.style.display = 'flex';
  document.getElementById('userAvatar').textContent = u.name.charAt(0);
  document.getElementById('userName').textContent = u.name;
}
async function checkLogin() {
  const u = JSON.parse(localStorage.getItem('st_user') || 'null');
  if (!u) return;
  const status = await checkUserStatus(u.email || u.phone);
  if (status === 'approved') {
    document.getElementById('loginOverlay').classList.add('hidden');
    showUser(u);
    applyProgress();
  } else if (status === 'pending') {
    showPendingScreen(u.name);
  } else if (status === 'denied') {
    localStorage.removeItem('st_user');
  }
}

// ============ CARD ============
function makeCard(v) {
  const url = 'https://drive.google.com/file/d/' + v.driveId + '/view';
  const badge = BADGE_MAP[v.category];
  const matchPct = Math.floor(70 + Math.random() * 28) + '%';
  let progressHtml = '';
  if (v.progress > 0 && v.progress < 100) progressHtml = '<div class="card-progress"><div class="card-progress-fill" style="width:'+v.progress+'%"></div></div>';
  else if (v.progress >= 100) progressHtml = '<div class="card-progress"><div class="card-progress-fill" style="width:100%;background:var(--green)"></div></div>';

  const statusText = v.progress >= 100 ? '<span class="done">\u2713 \u05D4\u05D5\u05E9\u05DC\u05DD</span>' : '<span class="notstart">' + v.duration + '</span>';

  return '<a href="'+url+'" target="_blank" class="card" data-id="'+v.id+'" onclick="markWatched('+v.id+')">' +
    '<div class="card-thumb" data-cat="'+v.category+'">' +
      '<div class="card-emoji">'+v.emoji+'</div>' +
      '<div class="card-play-btn"><svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg></div>' +
      '<span class="card-badge '+badge[0]+'">'+badge[1]+'</span>' +
      progressHtml +
    '</div>' +
    '<div class="card-info-bar">' +
      '<div class="card-info-title">'+v.title+'</div>' +
      '<div class="card-info-status">'+statusText+'</div>' +
    '</div>' +
    '<div class="card-expand">' +
      '<div class="card-expand-meta">' +
        '<span class="card-expand-match">'+matchPct+' \u05D4\u05EA\u05D0\u05DE\u05D4</span>' +
        '<span class="card-expand-duration">'+v.duration+'</span>' +
        '<span class="card-expand-badge">'+badge[1]+'</span>' +
      '</div>' +
      '<div class="card-expand-desc">'+v.desc+'</div>' +
      '<div class="card-expand-actions">' +
        '<div class="card-expand-btn play-sm"><svg viewBox="0 0 24 24" width="14" height="14"><polygon points="6,3 20,12 6,21"/></svg></div>' +
        '<div class="card-expand-btn" onclick="event.preventDefault();event.stopPropagation();markWatched('+v.id+')">\u2713</div>' +
      '</div>' +
    '</div>' +
  '</a>';
}

async function fetchDriveFiles(folderId, category) {
  try {
    const response = await fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents&fields=id,name,mimeType,webContentLink&key=${DRIVE_API_KEY}`);
    const data = await response.json();
    if (data.files) {
      return data.files.map((f, idx) => ({
        id: parseInt(folderId.slice(-4) + idx),
        category,
        title: f.name.replace(/\.[^/.]+$/, ''),
        desc: `📁 ${category} - ${f.name}`,
        duration: '✓',
        progress: 0,
        fav: false,
        driveId: f.id,
        emoji: '📄'
      }));
    }
  } catch (e) {
    console.log('Drive API note: files loaded from cache');
  }
  return [];
}

async function loadDriveContent() {
  let driveVideos = [];
  for (const [cat, folderId] of Object.entries(FOLDER_IDS)) {
    const files = await fetchDriveFiles(folderId, cat);
    driveVideos = driveVideos.concat(files);
  }
  if (driveVideos.length > 0) {
    VIDEOS = driveVideos;
    renderAll();
  }
}

function renderAll() {
  let videos = VIDEOS;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    videos = videos.filter(v => v.title.toLowerCase().includes(q) || v.desc.toLowerCase().includes(q));
  }

  // Progress overview
  renderProgress();

  // Continue watching
  const cont = videos.filter(v => v.progress > 0 && v.progress < 100);
  const cs = document.getElementById('continueSection');
  if (cont.length > 0 && currentFilter === 'all') {
    cs.classList.remove('hidden');
    document.getElementById('continueRow').innerHTML = cont.map(v => makeCard(v)).join('');
  } else { cs.classList.add('hidden'); }

  // Category sections
  const container = document.getElementById('allSections');
  const secs = currentFilter === 'all' ? SECTIONS : SECTIONS.filter(s => s.id === currentFilter);
  let html = '';
  for (const sec of secs) {
    const items = videos.filter(sec.filter);
    if (!items.length) continue;
    const done = items.filter(v => v.progress >= 100).length;
    const folderLink = FOLDER_LINKS[sec.id] ? '<a href="'+FOLDER_LINKS[sec.id]+'" target="_blank" style="margin-left:12px;font-size:13px;color:#54b9c5;text-decoration:none;font-weight:600;">📁 תיקיה</a>' : '';
    html += '<div class="section" data-section="'+sec.id+'">' +
      '<div class="section-header">' +
        '<div style="display:flex;align-items:center;gap:8px;"><div class="section-title">'+sec.title+'</div>'+folderLink+'</div>' +
        '<span class="section-count">'+done+'/'+items.length+' \u05D4\u05D5\u05E9\u05DC\u05DE\u05D5</span>' +
      '</div>' +
      '<div class="row-wrapper">' +
        '<button class="row-arrow right" onclick="scrollRow(this, 1)">&#8249;</button>' +
        '<div class="row">'+items.map(v => makeCard(v)).join('')+'</div>' +
        '<button class="row-arrow left" onclick="scrollRow(this, -1)">&#8250;</button>' +
      '</div>' +
    '</div>';
  }
  container.innerHTML = html;
}

// ============ PROGRESS ============
function renderProgress() {
  const grid = document.getElementById('myProgressGrid');
  const cats = [
    { id:'new', name:'\u05DE\u05EA\u05D7\u05D9\u05DC\u05D9\u05DD', color:'var(--green)' },
    { id:'supervisor', name:'\u05DE\u05E4\u05E7\u05D7\u05D9\u05DD', color:'var(--gold)' },
    { id:'wt', name:'WT+', color:'#7b2ff7' },
    { id:'general', name:'\u05DB\u05DC\u05DC\u05D9\u05D9\u05DD', color:'#0ea5e9' },
    { id:'docs', name:'\u05DE\u05E1\u05DE\u05DB\u05D9\u05DD', color:'#f97316' },
  ];
  let td = 0, ta = 0, html = '';
  for (const c of cats) {
    const items = VIDEOS.filter(v => v.category === c.id);
    const done = items.filter(v => v.progress >= 100).length;
    const pct = items.length ? Math.round(done/items.length*100) : 0;
    td += done; ta += items.length;
    html += '<div class="my-progress-card">' +
      '<div class="my-progress-header"><span class="my-progress-name">'+c.name+'</span><span class="my-progress-pct" style="color:'+c.color+'">'+pct+'%</span></div>' +
      '<div class="my-progress-bar"><div class="my-progress-fill" style="width:'+pct+'%;background:'+c.color+'"></div></div>' +
      '<div class="my-progress-count">'+done+'/'+items.length+' \u05D4\u05D5\u05E9\u05DC\u05DE\u05D5</div></div>';
  }
  const overallPct = ta ? Math.round(td/ta*100) : 0;
  html += '<div class="my-progress-overall"><div class="my-progress-overall-pct">'+overallPct+'%</div><div class="my-progress-overall-label">\u05D4\u05EA\u05E7\u05D3\u05DE\u05D5\u05EA \u05DB\u05D5\u05DC\u05DC\u05EA</div></div>';
  grid.innerHTML = html;
}

// ============ FIREBASE CONFIG ============
const FIREBASE_URL = 'https://super-team-netflix-default-rtdb.europe-west1.firebasedatabase.app';

async function registerUser(name, email, phone, tab) {
  try {
    // Check if email is in member list
    if (!isMember(email)) {
      return 'not_allowed';
    }

    // Check if user already exists in localStorage
    const existing = JSON.parse(localStorage.getItem('st_user') || 'null');
    if (existing && existing.email === email) {
      return 'approved';
    }

    // New member - approve automatically
    return 'approved';
  } catch(e) { console.error(e); return 'not_allowed'; }
}

async function sendTabNotification(tabName, userName, userEmail, userKey) {
  try {
    const res = await fetch(FIREBASE_URL + '/tabMembers.json');
    const members = await res.json() || [];
    const list = Array.isArray(members) ? members : Object.values(members);
    const tabMember = list.find(m => m.name === tabName);
    if (!tabMember) return;
    const approveUrl = 'https://superteamhlf.team/approve.html?key=' + userKey;
    emailjs.send('service_etqui87', 'template_6bo4ai9', {
      to_email: tabMember.email,
      tab_name: tabName,
      user_name: userName,
      user_email: userEmail,
      approve_url: approveUrl
    }).catch(() => {});
  } catch(e) { console.error(e); }
}

async function loadTabMembers() {
  try {
    const res = await fetch(FIREBASE_URL + '/tabMembers.json');
    const members = await res.json() || [];
    const list = Array.isArray(members) ? members : Object.values(members);
    const sel = document.getElementById('loginTab');
    list.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.name;
      opt.textContent = m.name;
      sel.appendChild(opt);
    });
  } catch(e) { console.error(e); }
}

async function checkUserStatus(email) {
  try {
    const res = await fetch(FIREBASE_URL + '/users.json');
    const allUsers = await res.json() || {};
    const user = Object.values(allUsers).find(u => u.email === email);
    if (user) return user.status || 'pending';
    return 'not_found';
  } catch(e) { return 'approved'; }
}

function syncProgressToFirebase() {
  const u = JSON.parse(localStorage.getItem('st_user') || 'null');
  if (!u) return;
  const prog = loadUserProgress();
  const key = (u.email || u.phone).replace(/[.#$\[\]]/g, '_');
  fetch(FIREBASE_URL + '/progress/' + key + '.json', {
    method: 'PUT',
    body: JSON.stringify(prog)
  }).catch(() => {});
}
